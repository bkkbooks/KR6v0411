body:
  text: 郡人徐𤊹纂輯林弘衍叅定鄭天綵賴亨侯吳興漢重訂紀田產供佛施田功垂萬刼蒲塞皈心桑門饌設斯倉斯廂南畝餉饁檀越芳名亘古不滅紀田產第六侯官縣一都二啚田土名西來坊九畝四分一釐八毫二絲二都一田土名宅上洋下壠二十二畝九分七釐三毫二都八田土名陣坂洋小路邊七畝二分三釐二毫一絲六都二田土名坑龍橋湖山洋四十六畝七分八毫六絲外荒坂七畝五分十五都田土名柑樜下井三角𡎔九畝七分八毫十六都田園土名小穆前洋邊田八畝九分三釐八毫八絲園三畝九釐七毫十七都田土名小穆裏南洋七畝三分五釐四毫十八都田園土名源口匏崙程灣樟岐田五百五十七畝二分七釐五毫四絲園二百一畝一分七釐五毫荒墾地二十畝七分四釐八毫官山八十畝受鈔山一百畝二十一都田土名源裏鳳尾一十四畝三分七釐七毫二十三都田園土名大穆溪連邊張山嶺彭坑過塘坂大穆埕田八百六畝七分五釐六毫園二十五畝二釐二毫荒則田園湖一十四畝一分六釐荒墾山九十畝內斯文山丘通灣廨院庄後門山佛堂後山二十六都田土名應天洋新尾東頭尾圳後小墘瀾田猥池土園梧溪田一千五百八十六畝四分九釐七毫園二畝四釐七毫外屋地一畝梧溪田六十四畝八分四釐四毫園八分二釐三毫二十七都田土名劍倉周填嶺兠仙洋張漈圳上蘇溪大梅大池劉洋羅老亭牛寮坂黃必嶺牛塲一千六百七十六畝九分二釐二十八都田土名孔坑溪坪漈上二百五十一畝五分九釐六毫園二分五釐地一畝六分二釐山壹所三十都田土名藍田箬往鄭地陳洋尚往寶溪天湖雪峰一千三百五十九畝七分二釐池二畝二分荒則池一十四畝八分五釐四毫三十一都田土名白沙下宅溪頭巷七十六畝二分七釐三毫五絲三十二都田土名保福墘四畝五分一釐三十三都田土名法雲洋木檀茭上白沙坑石柄四百九十五畝四分七釐二毫三十四都田園土名馬坑大瀨軍營大穆溪口官路東西一百三十九畝九分二釐三毫園九十畝六分二釐五毫湖六畝六分土名百景湖論曰雪峰有田自大唐咸通中藍長者始歷世既久朘削侵侔不知凡幾至有明萬曆七年奉旨清丈僅存侯官各都田園七千一百餘畝耳較之先代檀那所施十不得五而耕夫佔佃反操其柄主僧莫敢誰何年來當事者又括寺田以充兵餉而歲入租稅尚不足輸官僧徒苦無甯日履斯地者莫不蒿目而傷心焉若夫掊擊豪强使萬畝污邪盡歸常住庶幾佛日重光宗風不泯是在良有司加之意耳雪峰田產在明季尚有七千餘畝康熙三十六年侯邑主譚清丈存寺僅得五百畝有奇除崩陷荒蕪實不及五百畝係皆山高水冷收租不及完糧餉者若非勻香燈則殆矣內有三十餘畝乃玉漈吳姓于順治年間捐資從民間贖回以供獅巖香燈者併誌之
