根不朽峩然若小臺也木紋堅膩刻有唐天祐乙丑造菴及宋雍熙四年知郡事何允昭來遊題名在龕內龕之外又有元祐韋子鑒紹興任士安開禧陳景俊及鄭昻諸刻門庭高峻語難酬箇裏機鋒豈浪投堂中苔蘚深三尺更有何人滾木毬右木毬相傳祖師接物利生時每欲度眾輙滾出一毬示之傳燈錄云玄沙備頭陀見師滾出毬來仍即安在故處師便入房石卵層層遶塔輪相傳遺讖幻兮真塔門閉後師無語難覓前身覓後身右難提塔大師生時所預造全塔皆石四週琢作卵形仍有讖云石卵爆盡吾當復來橋蹴金鼇作勢雄水門聞與洞門通千溪萬壑爭流去久立不住吹長風右金鼇橋本山谿澗之水皆於此出灑水處相傳有洞穴深廣不可測檀那六度最稱先寶所雲庄地接連長者昔曾三捨業福田端只屬藍田右藍田庄乃長者藍文卿所捨到雪峰寺二首林弘衍閩縣人戶部主事千山擁護古叢林長者賢王昔布金十畝平池秋月淡一龕枯木曉烟深妝成雙表西洋塔啼破三春蜀道禽忍負夢中親囑累余曾夢師授記竹笻芒履遠追尋清涼法界自翛然不見炎荒杪夏天雪積危峰銷象骨香留孤榻噴龍涎雲堂久閉希聞梵酒禁常開恐礙禪石卵何時都剝盡與師還結再生緣遊雪峰四首高景閩縣人亂峰環向勢如奔鼻祖開山釋義存五縣版圖連大地十方衣裓禮空門何年寺額加崇聖易代鐘銘紀至元珍重金鼇橋畔路朝朝長聽水聲喧欲覔諸天最上頭曲欄深入講堂幽當年說法人何處此日看山雪尚流舊院伊蒲猶設供拂簷叢桂幾經秋半牀襆被餘香在疑是神僧去日留偏安亷主重宗風廣布金錢建大雄運鼎能供千眾食鑿池曾費萬夫工本師示寂還追祭長者捐資亦報功舍衛給孤今寂寞不堪重說梵王宮殿經刧火化為灰亦既重新久復頺藏骨千花猶有卵坐禪枯木不生苔香臺浴佛光還現蓮社邀賔禁乍開試問燒殘方丈地幾番曾見滾毬來訪定林上人草榻麻衣性亦甘雪峰峰頂結精藍清齋不受他方供公案能容老宿叅泉響琴中成迸水花開瓶裏盡優曇何如雞足修迦葉萬壑千巖寄一龕贈靜安上人高葢重嵐瘴海烟何如寒雪落峰前廿年徒侶皈依眾一郡名山取次遷孤榻臥雲朝出定清池蘸月夜安禪咸通法種誰堪繼似結存公再世緣游雪峰寺李時成閩縣人合嶂如雲駐一峰浸䔒仙屐問幽蹤雪深竟失炎蒸候寺古惟聞早暮鍾枯木有菴芳蘚沒斷碑無字夕陽封百年興廢銷沉刧閒對檉隂翠幾重象骨峰崒崒象骨峰落處平林折朅來事奇游雲隂轉蕩跌三度有遺踪古檉半藏雪坐覺六月寒杳矣人境別枯木菴檉竹翠盈盈留此一枯樹當時住錫中山精夕相護非色露烟含無香檀度何處覔存公雪滿前谿路龍眠坊冥搜遠不厭到此龍眠坊龍去復幾時霧氣自生光溪隂鳥影遁日落竹聲凉遙聆夕磬發倚杖立蒼茫無字碑日尋莽草間有碑獨無字不見昔時人誰解今來意飛鳥遺之音閒山逗孤翠我欲拈一言此石亦多事應潮泉應潮亦有泉廼在山之脊亂徑塞莽蒼迷我遠遊客潮來泉轉清潮去泉猶碧來去豈有期獨拊嵓頭石夏日遊雪峰四首董養河閩縣人雪峰高不極貪竒炎景入徑菀林綠漸覺薜衣冷列岫豁平疇龍池浸空影皈依梵相前兀兀諸緣屏其二古殿鬱岧嶤四壁生寒雪感彼塔下人誰為不生滅水磨日喧豗象骨空岌𡺼獨此一瓣香拈向石中其三拂拂檉上風泠泠石間瀑入夜星緯低凄然立寒谷不見弄毬人但見龍藏木念此不能忘月照禪牀宿其四峰頭望遠海有泉應潮汐呼吸信元氣高深復幻跡俛仰滄桑間幻軀良足惜卷葉聊酌之庶以沃火宅枯木菴存公昔何棲枯木雪峰趾空中不盈丈法輪轉於此紺殿有頹興依然眾山峙冥窺天地根枯榮安足擬無字碑何來一片石剝落蒼烟中欲讀已無字野燒吹天風游雪峰寺葉惇彥閩縣人金碧樓臺縹緲中寒泉聲潄玉玲瓏雨餘疊嶂青如染雪積高峰白未融每詫探竒逢勝跡𨚫因避暑挹清風幽閒永日喧囂隔遮莫浮生自轉蓬當年卓錫向山阿枯木蓊葱長薜蘿一徑縈紆過客少半空突兀掛雲多經翻寶藏塵氛淨像聳金身歲月過花落講壇香雨暝俯聽下界暮鍾和遊雪峰寺韓廷銓閩縣人共到法王地奇蹤昔已傳高峰疑帶雪片月照於天聽偈非吾事看碑識早年山林夙有僻此度更飄然又象骨古峰幽存公那得留一丘猶自勝數壑未停流此日雖云夏輕寒已似秋隔宵塵事遠都悔是初遊枯木菴枯木經千載曾為古衲龕閉關須得霧鎮日好觀嵐檉樹青成列流泉咽作潭㫋檀知不異更可擬優曇應潮泉傳聞此山中有泉在其頂潮汐無窮時乃與海水竝尾閭泄何處華池滿應逈竒哉此一泉隂陽故相等得非義存公有與此山訂幸茲獲勝遊曠然觀溟涬瀑布洞韓廷錫閩縣人水激洞門隱中有毒龍眠息深今古盡烟霧滿崖巔幽鬱雜樹重崔嵬嵓石古濆薄𢋫四時白日長疑雨無字碑一片癡頑石强言他是碑壁立謂韓子讀予身上詞韓子荅石碑滿爾身是墨世人皆不知獨有存公識枯木菴徑丈高一尋千年老枯木慮以為禪菴剡上刻其腹沙彌指相示當日義存公安禪常入定坐臥此菴中古檉檉古成修林遐探托幽步吟眺不言歸空烟生薄暮父老何為者跏趺檉樹根對之移日晷長嘯不交言木毬至人遺身心遂能驅木石存公不復來木毬豈異昔偶坐對山僧問爾當年事弄毬與作佛是一還是二塔屋問塔數落砲來未義存公香烟凝白日寂寞法王宮說法三十年還曾說一字拜手問存公再來欲何事應潮泉攀藤緣古磴為覔應潮泉白雪夏猶積孤寒生遠岍息盡諸緣空一念不復起山色淡欲無坐對應潮水雪峰夜坐禪牀高臥看瞑色片片輕烟度翠微池邊竹動鳥初宿石上月明僧獨歸聲沉碧嶂孤猿宿香滿空廊桂子肥前峰一半雪未盡白氣遠來偏映衣雪峰禪室幽居依古石避俗蹔迯禪深坐空林內枯吟積雪前鐘聲月下白塔影夜中圓寂寞誰相似松端孤鶴眠雪峰道中徐鍾震閩縣人紆廻磴路似羊腸踏徧芒鞋百里霜青嶂夾溪喧雪瀑藍田何處問山庄蕭踈乍見秋林赤刈穫初收晚稻黃遙認前朝雲際寺微微仙梵出僧房雪峰寺四首雪積閩南第一峰義存曾此首開宗菴中苔繡千年木關外濤翻萬壑松蘸月池涵殘夜水梯雲嶺度夕陽鐘石函金骨空瞻禮寂寂香燈古塔封勅書高著寺門看寶殿宏開碧漢端鐘勒有銘銷欲盡碑磨無字辨應難潮通泉脉秋寧旱雪滿峰頭夏亦寒若問梵宮興廢事昔時全盛半凋殘綠隂夾道影交加流水聲中石磴斜龍象當年瞻佛地雞豚隨處見人家堦前奯竹猶生笋裏優曇正放花法祖手栽雙樹在霜皮溜雨幹槎枒七百年來古道塲尚留香火祀閩王鑄金猶見先朝像殘絮還聞昔日香廚下鍋存空法喜寺中田盡少僧糧藍家長者歸何處誰復捐貲繼大唐雪峰枯木菴林春秀古田人巖如削鐵路如繩澗淺無聲半結冰獨有小菴依古木白衣人入是尋僧遊雪峰憶開山存師林嘉閩縣人飛錫三千界焚修七百年天開雲際地人舍寺中田一自咸陽刼因嗟棟宇遷寥寥僧數種只有木毬傳雪峰獅巖山居釋如淨草徑蓬門客到稀低垂獨坐易忘機枯柴煨去能消凍野菜烹來可療饑蝴蝶夢殘空自舞杜鵑叫切幾曾歸塵間不用重回首老我青山一衲衣空谷無人好晝眠醒携藜杖傍巖泉栖遲適意非關隱著作娛心豈礙禪煮茗不曾觀蠏眼焚香何必問龍涎案頭剩有經書在消遣餘生莫論年重過雪峰譚述侯邑令再到雨花地禪關鳥弄晴松杉紅日麗洞壑白雲橫流水行人意高山故友情停車相顧問前度老僧迎雪峰寺張若泉孝亷路入重巒靄瑞烟祗林僧院近諸天月臨湖影禪心寂風遞鐘聲道韻綿拂地於今猜古木應潮自昔羨靈泉擬題詩句舒幽興香噴山花入法筵遊雪峰寺鄭天綵傳聞此地未經冬雪積羣山碧幾重寺負高崗來舞鳳坊臨幽徑曰眠龍禪心皎潔高秋水客夢虛閒半夜鐘蘭若無塵甘寂寂中天月色映芙蓉和釋月菴二十四景雪峰山千峰萬壑繞芙蓉靈氣衝寒積雪濃一任炎蒸偏耐暑未曾陰霰已如冬石泉活汲烹新茗天籟時鳴𦗟古松最愛花宮清夢寂月明深夜有疎鐘寶所亭萬木陰籠寶所亭飄飄芳靄接天青松濤夜送龍歸柳浪春連水在瓶畵棟依然懸玉藻雕簷猶自响金鈴人來多是空回去昧𨚫衣珠負性靈藍田庄藍田漠漠抱羣峰長者庄居瑞氣鍾白璧不教人再種黃粱應任水頻舂如言往事憐啼鳥𨚫憶先賢請學農回首有何清絕處孤村落照翠重重枯木菴是何菴近梵王宮古木枵餘斗室空靄靄烟雲生戶牖垂垂蘿薜偹簾櫳無妨池草侵衣碧那管山花刺眼紅趺坐不知天地老禪栖杳在萬山中三毬堂三毬堂倚白雲邊代傳來幾百年動比流星還活潑居𠲒玄象本團圓非關空色明心地不落言詮顯性天除𨚫衲僧誰會得謾教獅子戲庭前一洞天一洞天開掛碧山清泉瑶草別塵寰高吟每就聽松後清夢常回枕石間絕壁雲深猿嘯過上方月靜鶴飛還桃敷梅謝稀人到落盡閒花滿地斑半山亭遙瞻亭子在雲端步到雲端興未闌萬木密陰蒼澗遠羣峰遙幕碧天寬莫嫌草露沾衣濕偏愛松風入座寒只此清幽堪賞玩不妨片刻更盤桓化城亭化城應不少樓臺今只空亭宿霧堆無復天花雲際落但餘野菊草中開窺人羣鳥飛還宿掛璧孤猿去復來過客不勝懷往事杖藜橫曳獨徘徊無字碑甚碑自昔卓雲邊苔蘚蒼蒼字未鐫不是峴山休墮淚非關薦福謾垂涎別秦恥用黃金檢較趙欣同碧玉堅道體原無言可載何勞揮洒筆如椽萬松關路入松關一望齊白雲深處隱招提連天飄渺濤聲遠拂地參差月影迷葉茂好遷鶯出谷花飛定點燕啣泥何時滌𨚫塵心淨亦結茅菴此地棲雪嶠路如步瓊林玉宇中廣寒疑有路堪通淺深鹿跡兼人跡來往龍宮與梵宮看竹豈知雲靉靆尋梅𨚫訝月朦朧躋攀直上凌霄處覺與紅塵趣不同龍眠坊山勢逶迤路與斜龍眠坊子綠陰遮濃雲一旦藏頭角怪石千秋露𤓰牙蟄以待雷將㴻雨吟而起霧亦生霞何能寤𦗟空王法恒與諸天散寶花文殊臺勝地清凉翠靄堆文殊大士有高臺喧空法鼓兼雷動歷亂天花帶雨來茶泛玻璃何處是猪名薄荷幾時回炷香叅謁獅王下瑶草瓊葩浥露開古鏡臺片石天成古鏡臺個中光彩待誰開不愁野馬堆塵到豈許孤鸞照影來拂拭有容傍碧樹琢磨無意長青苔他年若遇擎天手移上雲衢鑑九垓金鰲橋橋橫幽澗跨寒空言比金鰲出浪中蹴得猶於浮海異看餘豈與駕山仝乍臨乍散嫌鳥鵲旋有旋無讓彩虹不許任公香餌釣入雲人跡自西東羅漢巖半千神衲隱天台若個雲遊此地來高潔可方天竺寺幽芳何似雨花臺風飄薄霧沾溪柳日映殘霞綴壁苔到眼等閒皆美景悅人更有野花開梯雲嶺峻嶺千層透碧空丹梯何異步長虹陰翳樹遶人烟渺曲折溪連鳥道通野叟負薪經石畔山僧看竹入雲中誰知個裏忘機趣雅淡堪追大古風象骨峰岧嶤聳翠勢偏雄遶足群山莾蕩中象骨垂芳開寶所獅絃繼响播真功居憐畫景山兼水夢冷松聲雨又風此日登臨多領略招朋携酒過林東磨香石當年磨石即聞香此日猶興百卉傍遺迹不無人偃仰頻過只有蝶悠揚糢糊字蝕年華遠縹緲雲封夜氣凉宋碣唐碑多冺滅此身安得浥餘芳放生池池涵春日水融和於仞魚蝦跳躍多獨戲休驚垂以釣羣遊謾訝納諸羅頻移柳絮吹漪浸不逐桃花送逝波幾度臨流深有感校人盍把寸心摩蘸月池㶑灔芳池數畝寬何來閃碧夜光寒天心不異氷輪掛水底應同玉鏡看薄霧豈妨蟾窈窕踈星偏遶兎圞團莫愁斜墜西峰去來夕還交樹影蟠望州亭山自蒼蒼水自流趙州端的近秦州企予不見徒穿眼倚杖無聊數舉頭彼此真僧思萬里古今公案話千秋有懷須得遊仙枕不隔纎塵見十洲卓錫泉高僧卓錫碧峰前何意留來一線泉洒柳淨宜稱石乳瀹茶香可傲龍涎渠成畢竟涵秋月壑潄依稀响夜絃觧渴不無甘露味源頭猶訝在西天應潮泉高山泉應海中潮時候無差長復消盈縮浸天窺白晝往來隨月計清宵可知大塊通元氣孰解灵區別世囂沁冷詩脾驕羽化何須跨鶴更吹簫乘雲臺僧已乘雲去臺猶引月來天風吹𠁊籟仙鶴獨徘徊遊雪峰寺賴亨侯杖履來初地風幡拂畵梁青山扆古剎碧澗繞廻廊松月窺禪淨巖花入呪香自憐嬰世網何暇問慈航登絕頂層巒縹緲俯青霞此日難逢雨散花酒榼夤緣青嶂外詩囊瀟洒白雲涯中天樓閣纖雲斷隔樹烟村落照斜覽勝賞心傾倒極浩歌驚起暮栖鴉和石倉曹亷憲雪峰十二詠雪峰山想探危巒幾百重雪深常未及玄冬晶光寒映三秋月合上𬎝瑶第一峰烏石嶺烏嶺亦垂掃地枝真僧再到是何時游瞻石色濃如墨古剎叢中仗羽儀應潮泉奇泉觱沸湧危巔潮信盈虗應不偏知是靈區通海眼豈同他水繞峰前留香堂誰人不欲後留香縱有些兒亦易忘何似此堂貽得遠當時錯怪穢皮囊乘雲臺乘雲人去只空臺何日依然此地回佇望蒼茫烟靄斷翩翩一鶴自西來蘸月池活水何來自逶迤浮沉孤月影遲遲勝遊偏值中秋候桂影蟾華滿石池萬松關深鎖白雲拂日光萬松夾道靄蒼蒼夜來濤引清風起遙和鐘聲繞梵王枯木菴糾結輪囷木已枯中枵外綺祖師趺頻經歲月乾坤老遠紹芳踪尚有乎三毬堂玄機無用語言酧悟得心空法自投欲識西來端的意堂中但看滾木毬祖師塔荷負西來正法輪亭亭窣堵隱遺真爆餘石卵今成讖誰識吾師覺性身金鼇橋鷲院獅巖勢竝雄金鼇佳氣鬱相通橫空欲鎖千峰勢洒水聲連萬竅風藍田庄寺自唐朝肇迹先山庄不遠翠微連如今黍稷僧何有舊是藍家種玉田雪峰寺吳興漢夫何秀氣鬱嶙峋唐代禪栖甲七閩樹裏池塘清可鑑雲中殿閣靜無塵經翻龍藏香千篆定起鯨鐘月一輪多少慧燈斯發燄曾聞透網有金鱗登獅子巖吳𬎝梅巖高飛鳥外香宇寂雲巔繞檻青峰秀當窓白日懸虹霓生樹杪麋鹿戲花前可愛虛閒地堪栖面壁禪雪峰寺釋實松山勢如城翠潑天中間畵棟與雲連盤空合去多芳樹絕頂分來有活泉掛錫不離烟靄裏挑燈常在月明前秋風吹冷鋪金地擬待何人結勝緣雪峰二十四景之十二雪峰山叠翠凌霄上羣山落四隣峰巒常有雪水石自無塵象骨言仍舊鷄園搆屢新最宜雲臥者幽寂此栖真應潮泉異泉生絕頂不與眾流交深淺非干雨晨昏自應潮未殊溟渤長寧逐尾閭消造化初難測傳聞在昔朝獅子巖佳哉山有石獅踞勢昻昻蘭室依幽敞洞天自鬱蒼憑之揮畵幅詠以入詩囊早晚聊栖止令人逸興長文殊臺何謂雲巖秀清凉迹五臺樹深從鹿宿山峭待人來未遇祥光現安知覺路開尋常樵牧者徒向此徘徊羅漢巖怪石摩空峻真僧此地遊如停芳樹下應舉亂雲頭莽蕩臨青漢巉巖俯碧流芳塵難可躡瞻望思悠悠鐵鎖橋千盤泉落處林𪋤有溪橋意足名區固勢干勝氣遙鼇擎橫綠野鵲聚墮青霄神物常呵護無愁沒巨潮枯木菴大樹摧殘久輪囷丈許存中虛成小屋外闢自衡門清苦安禪便淋漓題銘繁數椽長護惜盤地有靈根無字碑片石空山裏摩挲儼古碑蟲文猶剝落鳥篆盍鐫之休使雷轟破無勞客問奇個中存別趣蒼頡未生時金鼇橋萬木垂陰處津梁喜有成金鼇雲裏跨靈鷲霧中行橫鎻奔流勢疾飛瀑布聲懸巖通險阻山徑轉幽清卓錫泉何人卓錫去引此泉滔滔迸石知源遠入雲得地高甘猶噴玉髓淨可鑑秋毫欣覩神蹤在餘芳澤我曹蘸月池逈絕纖塵翳月來映愈清涵虛千丈碧徹底一輪明漂練舒銀漢開簾動水晶霧消雲亦散直看過秋更梯雲嶺峻極層層起雲深梯亦賖昭回攀碧漢曲折踏青霞依樹山亭小傍溪水碓斜徃來人冉冉空望梵王家登雪峰釋慧門遠陟祗林想叩關管窺那復見多斑池涵夜月窓前白松拂朝雲塔外閒覓句每因聆好鳥安禪且得入深山雖然未會拈花旨也寓栴檀寶樹間
