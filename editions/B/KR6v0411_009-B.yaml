body:
  text: 郡人徐𤊹纂輯林弘衍叅定鄭天綵賴亨侯吳興漢重訂紀題咏山水定在陵谷易遷代殊時異逝水奔泉高蹤遐覽金石相宣載吟載咏雲嶠留篇紀題咏第九詩類雪峰溫泉宋僧可遵福州人禪庭誰立石龍頭龍口湯泉沸不休直待眾生塵垢盡我方清冷混常流和可遵雪峰溫泉宋蘇軾眉山人諡文忠石龍有口口無根龍口湯泉自吐吞若信眾生本無垢此泉何處覔寒溫觀雪峰溫泉二首宋李綱邵武人諡忠定溫冷泉源各自流天教施浴雪峰陬眾生塵垢何時盡汩汩人間幾度秋玉池金屋浴蘭芳千古華清第一湯何以此泉澆病叟不妨更入荔枝鄉游雪峰將至大穆溪宋李彌遜連江人諡忠肅造物隨人意輕帆百里間舟痕風力徤客枕櫓聲閒山合塵蹤斷秋高爽氣還望州相見處驀直透三關訪雪峰真歇禪師紅塵白髮不相投來就僧房借板頭大士法中龍象貴老翁心外水雲浮長蘆江靜千山月枯木巖寒一景秋別後相逢重著語牧童橫笛倒騎牛題雪峰大夢因禪師頂相終朝咬菜根那得許精神自笑形為贅從渠畵不真閒雲留片影活佛化千身大夢何時覺痴人問木人游雪峰寺宋劉克莊莆田人諡文定七里深林集暮鴉插空金碧被林遮華堂何止容千衲菜地猶堪置萬家虎去有靈知伏弩僧來敘舊約分茶世人要識峰頭冷六月重綿坐結跏游雪峰宋戴昺天台人雪峰峰頂寺來此定詩盟山瀑分雲影松風亂雨聲眼明春樹綠心醒曉鐘清未好言歸去塵中事又生贈雪峰寺超長老仰窺玉匳天靣窄頑碧顛青自天擲祖師不管地祗慳千五百徒此其宅流水聲中換今昔粉抹頳胡老椽壁枯木菴回舊日春難提塔示重來折超公最後法席張全機撲落輥毬塲曾令天花倐飄墜況有庭橘符青黃烏藤橫膝傲佛祖熟識眉宇瞬且揚天吳吹瀾洗霾垢方諸挹月來清涼東甌萬剎盡金布咋舌誰堪論妙悟曾教叅兒走衲雲高枕無乃林泉負廬峰南遠真西材叩寂丈室慙宗雷秀顛龐眉遍人爽反疑不自塵中來由來山興復不薄畏途何計揮塵縛詰朝走馬汗修顏又作楊花無止泊雪峰菴元嚴士貞崇陽人在湖廣崇陽縣巖頭寺之西雪峰義存訪奯禪師駐錫于此鼇山店上話綢繆悟道今經幾百秋唱教須從自己出明心豈假外人求同條生不同條死歴刧功因歴劫修晚歲閩中千百眾播揚還憶老巖頭游雪峰見林舊集郡志悞作唐泰今改正明林鴻福清人禮部郎中微霜落葉度關河古寺清秋掩薜蘿輕策獨隨飛鳥去好山偏向夕陽過三花秪苑逢僧少獨樹空林積雨多蹔盍朋簪耽勝果下方塵土易蹉跎雪峰歌送雲上人王恭長樂人翰林典籍七閩山多如蜀川千巖萬壑疑登天六華峰高雪作頂五月夜半聞寒蟬芙蓉石窄人飛過蓮宇經臺尚經火無字碑橫任鹿眠磨香石冷從猿臥憶作法園初布金三千緇錫遶叢林經行龍象諸天影禪寂蛟鼇萬籟音杉枝青青低覆地木人也悟西來意五百年光轉眼休重見真僧出凡世鐔津法侶解楞伽𨚫下九華登六華枯木菴前掛如意留香堂上搭袈裟朅來下界相逢處幸接微言沃甘露鑿齒由來識道安遠公自是奇玄度法舟今去幾時逢塵世空瞻象骨峰歸見住山相問訊西江一泒是禪宗送僧住雪峰崇聖寺雪峰崇聖寺方丈久荒苔愛爾禪枝秀如今法宇開明心超上乘真旨悟西來振錫從茲去雲邊施食臺送雪峰寺僧龍淵高廷禮長樂人翰林待詔新持半偈出青蓮孤閒雲思渺然金錫來承天漢語紫衣歸坐雪峰禪尋鐘野寺殘山外潄齒寒流落照邊行至東林休結社松枝已偃舊房前雪峰二十四景天順元年題沙門源潭雪峰山奇峰積雪隱芙蓉畵不成形染不濃霽色遙觀三島月寒光常見四時冬瑤臺凍合深迷路玉樹花開半雜松僧住上方銀世界虛明影裏出踈鐘寶所亭金碧玲瓏寶所亭溪山四面染丹青水晶簾外珊瑚樹瓔珞龕前瑪瑙瓶織錦天孫迎象駕散花玉女護金鈴月明徙倚雕欄望百瑞光中走萬靈藍田庄藍田庄近六華峰峰頂藍田秀所鍾分水遠從寒澗落隔雲長見夕陽舂前人種玉初生子隱者耕雲自學農欲採靈芝遊此地蒼巖翠壑路重重枯木菴池邊枯木劈禪宮內坐真僧觀太空璧月珠星窺竅穴錦雲彩霧作簾櫳經年苔蘚留春色別㠘烟華笑晚紅可是根源延歲月靈苗毓秀滿山中三毬堂六華峰在象山邊堂上三毬不記年欲去欲來無定止非虛非實自團圓休將綵棒拋過海莫挽雕弓送入天可是吾師曾演化三星驚落翠微前一洞山一洞天開縹緲山洞中誰識是仙寰無窮景物在規裏別有乾坤非世間松徑月斜巢鶴唳石門雲濕雨龍還至人招我觀瑤草足踏殘花滿地斑半山亭翠微亭子起巖端此日凭高興未闌仰看層巔雲影近俯臨絕澗水空寬羣鴉斜度天風急一鶴遙衝海樹寒況有松隂堪憇息遊人誰不此盤桓化城亭自天移下化城臺臺下黃金滿地堆風引慈雲巖畔起月明真境畵中開仙童奏樂瑤空去玉女持花鷲嶺來多少遊人同會此水光山色共徘徊無字碑穹碑斜臥古巖邊妙道元無字可鐫剝落舊紋惟蘚跡模糊新篆是蝸涎天成不用龜趺載歲久還同玉體堅欲把新詩題往事惜無鋒筆大如椽萬松關誰種青松萬樹齊兩行夾徑入招提半空爽籟秋長在滿地涼隂晝欲迷琥珀氣浮成翠靄黃金花落混香泥吾將攬結蒼蒼色縹緲巢雲伴鶴棲雪嶠路遠嶠迢迢透雪中素華凝處往來通高如玉砌升瑤闕峻似銀橋上月宮仙子步虛身晃朗征夫躋險影朦朧尋梅直上層巔去下顧平原一色同龍眠坊山似龍眠一帶斜此身常是白雲遮雨餘有汗生鱗甲樹密無人見爪牙變化何時逢霹靂蜿蜒長日吐烟霞不知何代經降伏歴盡乾坤幾歲華文殊臺烟霞萬頃錦成堆舊是文殊顯化臺西極好風南海過中天法雨下方來綵毫獅子乘雲去金佩龍王帶月回千古靈蹤何所見清涼石畔野花開古鏡臺似玉無瑕古鏡臺乾坤未判自先開一天雨洗塵埃淨萬壑雲收月影來金碧畵中開曉匣氷蟾暈裏長蒼苔何由飛上青霄外分散神光照九垓金鼇橋金鼇出地欲騰空橫駕長溪碧霧中倒影不隨流水去幻身應與臥龍同恍疑銀漢連烏鵲復訝清波現綵虹莫向滄溟載蓬島行人永賴度西東羅漢巖神僧高隱在天台借問何時渡海來雲路舊通方廣寺石巖况近梵王臺靈光午夜連明月聖跡千年寄碧苔異景青春常不老至今猶見百花開梯雲嶺古嶺岧嶤近碧空天梯萬丈跨飛虹雲開鳥道層層險路入松門步步通仙仗每遊蒼樹裏樵歌遙度碧烟中幾回想躡東山屐前後登臨笑晚風象骨峰大象由來力勢雄是誰剸骨垜空中髓枯盡變玲瓏石秀發還從造化功疑是巨身沉古澗更無長鼻動春風何當一夕生元氣遙載神僧過日東磨香石玲瓏石上好磨香造化鍾成古道傍清氣不隨風散盡英華長與霧悠揚依稀雞舌浮春暖恍惚龍涎吐夜凉知是何人留手澤經過誰不嗅餘香放生池秋氣清凉春氣和放生池上放生多恣飛恣躍無拘繫隨去隨來脫網羅荷葉葢中擎化雨菱花鏡裏漾仁波俯臨清淺觀天影萬象熙熙共盪摩蘸月池湛湛平池數畝寬一波不動夜光寒弄珠神女乘空去臨鏡嫦娥倒影看白碧古今長混合青天上下映團栾水晶宮殿無纖翳時見蛟龍海底蟠望州亭夕陽西下水東流獨上高亭望趙州雲起碧空迷鶴影雨收蓬島露鼇頭嘗茶人往知何處祗樹花殘度幾秋十二欄干吟倚遍一輪明月在滄洲卓錫泉雪峰峰下翠巖前卓錫開通一派泉甘味絕勝和石髓流香應是帶龍涎碧寒苔蘚封靈跡清雜松篁響夜絃溪轉機玄留不住終歸大海浸蒼天應潮泉碧沼靈泉應海潮潮來泉長去還消一呼一吸通天地乍淺乍盈隨旦宵下有水仙居溟漠上浮清氣逼炎囂恐驚深窟蛟龍睡不敢閒吹碧玉簫次韻二十四景沙門智明月菴先師既賦二十四景已盡寫一山之勝明不自揣量敬和如數比較原唱隔一塵矣雪峰山六華凝結素芙蓉隔崦流雲淡復濃夏入伏中微覺暑時移秋半便如冬銀堆錯落千重嶺玉砌槎枒百丈松幾度雨花臺上望光搖樓閣起霜鐘寶所亭瓊瑤臺畔彩花亭高倚雲霞遠送青翡翠雀栖多寶樹珍珠花插粹金瓶沉香烟吐屏前鴨紫竹枝敲榭角鈴倚徧玉欄揮梵麈半空黃鶴載仙靈藍田庄井井藍田遶雪峰幽人種玉玉多鍾徑邊梅落香難散巖鏬泉飛水自舂仙女穿雲閒拾翠山僧帶雨看耕農丹山碧水烟村遠九里松深翠幾重枯木菴古木中虛廣若宮老僧於此坐談空根蟠地軸通滄海影落湘簾暎繡櫳石竹雲𮟣搖晚翠山茶雪後襯春紅對茲休問榮枯事都在冥冥幻化中三毬堂猊牀麈尾妙無邊名播華夷五百年三箇趯丸非定器一團真氣合乾圓循環偶數原奇數來往人間忽上天千百眾中誰會得玄沙微笑立堂前一洞山天下名傳第一山山中有洞異人寰璚芝瑤草芳菲外瑞靄祥雲縹緲間偶見金蓮從地湧倐看白鶴自天還天台劉阮應堪笑出洞懷仙𩯭已斑半山亭巍亭結架碧雲端畫棟雕梁玉砌闌勢槩山川能自大清留風月不須寬隔溪紅影留殘照入坐青隂送曉寒堪笑會稽蘭渚會流觴曲水恣盤桓化城亭扶笻閒步上高臺滿目烟霞錦作堆翠竹風搖明月碎青山雨過白雲開王孫顯化城中住佛子從多刧外來可是導師方便處天花法雨共徘徊無字碑一片名碑偃徑邊龍章鳥篆古曾鐫月斜梅影濃如墨雨洗苔痕滑似涎天愛奇文雷電取地箝恠石雪霜堅要令夜夜星辰照歲久無人構一椽萬松關萬樹喬松插漢齊孤標挺秀列菩提月中影淡霜根冷雨後隂濃草徑迷黃粉飄時香逗谷白苓生處氣蒸泥關前間植琅玕竹引得青鸞紫鳳栖雪嶠路久住銀山銕壁中岧嶤一徑少人通天神種玉鋪瑤砌羽客乘雲步梵宮夢入九霄魂杳緲覺來千里月朦朧峰廻岫轉雲深處逈與紅塵路不同龍眠坊蜿蜒山勢半欹斜髣髴龍眠霧氣遮松底枯根蟠老骨竹邊新笋迸靈牙暮歸古寺聞真法晨向東林咀絳霞滄海夜深明月上頷珠一顆散光華文殊臺六出峰頭翠作堆文殊臺徙近華臺維摩示疾牀中卧龍女呈珠海上來獅座氤氳香霧繞象峰皎潔寶星回時人會得清涼意大地春歸花自開古鏡臺本來明鏡亦非臺鏡若明兮心自開窈窕青鸞團影舞嬋娟玉兔送光來中涵日色星星火背剝銅青點點苔海角天涯雲散盡禪心皎皎照京垓金鼇橋遠見鼇山聳碧空鼇橋又跨漢津中衢通京國千岐路水出源頭萬𣲖同白晝無蹤騰沸浪青霄有影接飛虹高僧西去何時返橋畔松枝欲向東羅漢巖一錫飛來駐上台巉巖高處絕人來澗邊雨洗降龍鉢巖畔風生伏虎臺抱子玄猿窺綠樹引麑白鹿䑛蒼苔懸知諸漏都忘盡銕杖敲門總不開梯雲嶺迢迢石磴掛晴空山轉橫垂飲澗虹斷雁恍疑天上落歸鴉閃與日邊通遠看人影依微際近聽松琴杳靄中靜夜不知明月上玲瓏仙佩振香風象骨峰屹哉巨獸更成雄夷國來皈佛地中曾授普賢行願力仍從雪老苦修功如何枯骨長埋石無復雙牙再露風焚𨚫幻身名尚在真靈元自海涯東磨香石天降芒星石魄光誰言磨盪翠微傍晴分烟縷非風嫋夜吐精花帶月揚不比紫茸茶品液可宜龍腦雨中凉而今蘭若流光遠何必長薰解脫香放生池聖朝淨域煦天和品類羣生放且多堪笑坦途施坎穽更嗟平地下絲羅謾將此處為仁海淨洗人心止慾波撤去商家三面網乾坤生氣共呵磨蘸月池誰鑿方塘一鑑寬澄波湛湛月華寒紛紜野馬空中絞燦爛冰輪水上看桂洗清香浮馥馥松垂瘦影照欒欒老僧不斫吳剛斧留箇根株偃蹇蟠望州亭亭遶千山萬壑流相望趙老在何州心馳寥廓天窮處目斷蒼茫水盡頭雨洗鼇峰吟裏趣雲迷鶴路望中秋神機欲問因何事知在蓬瀛第九洲卓錫泉攜