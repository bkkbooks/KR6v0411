front:
  text: 雪峯志序教道中大千剎土統為諸佛報境然則川岳儲靈煙霞毓秀不知創自何始忽乃挺生奇杰蔚為照世光幢人境叶符曠世一覯如雪峰勝槩乃閩天第一道場彼真覺大師者僧海寶王法門真吼兒時見花幡像設喜動容光行脚訪投子洞山不辭足繭鼇峰成道得力雖藉巗頭芥孔投鍼正脉還思德嶠水因源遠滙為雲門法眼兩宗翮借飈扶突出玄沙長慶諸子自非家風縝密安能支派長流若夫天龍呵護地祇效藍長者捐宅為寺閩國主傾心四事因緣輻湊時節相應則知乘乎法運示現者詎易測其原委哉昔百丈老人謂過去迦葉佛時曾住此山可見百丈已前更有開山之百丈豈雪峯之後甯非重到之雪峰乎蓋前身後身孰為異世彼剎此剎原無分區祖師讖云塔石爆卵杉枝篲地奯竹筍生不妨打箇筋斗再來第昔人傾家布施今豪寺產鯨吞倘雪老復出不知藍翁父子能再來檀越否耶吁祖庭寥落不復覩漢官久矣乃興公徐居士以描天藻思寫物宏才如將雪峯山水一筆畫出其間昨葺今頹雖更不常使覽斯志者一見頓還舊觀彼大師作之於七百年前而居士纂之於七百年後雪關將前後事串為一序抑何偶然尚不識簫鼓琵琶能賡千古曲調更復是誰得山林居士喜而授諸梓俱當虛猊牀以待之報其功績可也崇禎壬申歲冬日博山釋智誾撰重刻雪峯誌敘佛祖出世的本懷原為導人向善而達於至善雖先後間興然必時與處會始獲宏其道焉故名山大澤一經偉人達士之所遊履高僧隱者之所棲遲其勝槩玄猷必班班可考久而不磨俾千古之下儼然如見雖不能至而心嚮徃之此山經地志所由作也閩中雪峯昉著于唐誠曰地靈苟非人傑惡足以成其美凢岩洞之幽深殿閣之宏麗皆有可書而前言徃行足以啟人心目者詎可任其散失而弗編修歟按唐咸通逮明崇禎間相距七百餘載前志有無固不可考今觀徐興公居士所輯雖時殊世異不無遺失而禪宗藝文與夫剏建等項井井燦若列睂揣其用心蓋亦勤矣然非目破五車焉能捃拾七百年來之殘編蠧𥳑彙而成書每慨操䉉之難未嘗不拳拳三致意焉教中道世尊滅度後正㳒像㳒各一千年末法則有萬年今入末法僅七百年嗣後有以大雄氏之道鳴于此山者固未可量也即欲仰止前徽遡流尋源舍斯志其孰與歸且道塲之隆替關乎法運而世故之滄桑有若循環百有年前編次之書遍覓諸剎僅獲一帙釋今弗為翻刻安保其不為烏有先生耶匪獨辜負前人心血而後來高才博識有欲從事于斯者亦彌遠而無徵孰謂是役可緩乎適有善士頼亨侯鄭崇絢吳武卿諸君樂為重梓乃將邇年見聞續入一二以付剞劂特書其緣起如是時乾隆歲在甲戌𡥠冬雪峯釋實松題雪峰志目錄卷之一紀形勝卷之二紀剏立附題刻卷之三紀禪宗卷之四紀法泒卷之五紀當山卷之六紀田產卷之七紀生植卷之八紀藝文卷之九紀題咏卷之十紀悟證
