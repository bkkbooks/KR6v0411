body:
  text: 郡人徐𤊹纂輯林弘衍參定鄭天綵賴亨侯吳興漢重訂紀悟證法侶機鋒心傳心悟片語流傳宗風遠布寶筏迷津千秋得渡滄桑代移靈明猶故紀悟證第十福州雪峰義存禪師初參德山問從上宗乘學人還有分也無山打一棒曰道甚麼師曰不會至明日請益山曰我宗無語句實無一法與人頌曰此疾懷來沒量時尋醫求卜過多師濃煎一服通神散血汗滂流徹四肢保寧勇是法平等無高下伊余有分必相亞雖無一法輕與人棒下龍蛇從變化雲巖因雪峰與巖頭欽山至澧州鼇山鎮阻雪頭每日打睡師一向坐禪一日喚頭曰師兄師兄且起來頭曰作甚麼師曰今生不著便共文邃箇漢行腳到處被他纍今日到此又只打睡頭喝曰噇眠去每日牀上坐恰似七村裏土地他時後日魔魅人家男女去在師點胸曰我這裏未穩在不敢自謾頭曰我將謂你他日向孤峰頂上盤結草菴播揚大教猶作這箇語話師曰我實未穩在頭曰若實如此據你見處一一通來是𠙚與你證明不是處與你剗𨚫師曰初到鹽官見上堂舉色空義得箇入處頭曰此去三十年切忌舉著又見洞山過水偈曰切忌從他覔迢迢與我踈渠今正是我我今不是渠頭曰若與麼自救也未徹在師又曰後問德山從上宗乘中事學人還有分也無山打一棒曰道甚麼我當時如桶底脫相似頭喝曰你不聞道從門入者不是家珍師曰他後如何即是頭曰他後若欲播揚大教一一從自己胸襟流出將來與我蓋天蓋地去師於言下大悟便作禮起連聲呌曰師兄今日始是鼇山成道頌曰說盡平生去住因到頭難遇赤心人忽然自肯成家業瓦礫拈來也是珍枯木成鼇山成道足人傳莫是從前話未圓賴有玄沙知始末遍身紅爛在漁船龍門遠丈夫凌勵志英雄向外馳求枉用功到得鼇山開眼覷方知屋裏用無窮佛燈珣孤村陋店雪紛紛平地無風起浪痕醜拙只因藏不得胸襟流出蓋乾坤鐵山仁二三回九度太顢頇到底須尋舊路還待得鼇山消積雪至今平地起波瀾困有眠牀飢有飯連聲何事叫師兄明朝雪霽鼇山路依舊一程還一程象外超雪峰住菴時有兩僧來師以手拓菴門放身出曰是甚麼僧亦曰是甚麼師低頭歸菴僧辭去師問甚麼處去曰湖南師曰我有箇同行住巖頭附汝一書去書曰某書上師兄某一自鼇山成道後迄至于今飽不飢同參某書上僧到巖頭頭問甚處來曰雪峰來有書達和尚頭接了乃問別有何言句僧遂舉前話頭曰他道甚麼曰他無語低頭歸菴頭曰噫我當日悔不向伊道末後句若向伊道天下人不奈雪老何僧至夏末請益前話頭曰何不早問曰未敢容易頭曰雪峰雖與我同條生不與我同條死要識末後句秪這是頌曰末後句為君說明暗雙雙底時節同條生也共相知不同條死還殊絶還殊絶黃頭碧眼須甄別南北東西歸去來夜深同看千巖雪雪竇顯末後句兮無問處萬仞鐵山橫在路當日巖頭不奈何至今雪老難伸吐倒𪭺虎鬚方識虎未解行人休離母透過牢關舉似君把定咽喉淚如雨佛印元雪老𨚫入菴中後路上無人見得伊賴有故人千里在同條生死不同時白雲端雪老別鼇山卓菴閩中坐一日見僧來探頭道甚麼末後句少人和𨚫得巖頭重注破同條生同條死末後句莫錯舉照覺總切磋琢磨變態譊訛葛陂化龍之杖陶家居蟄之梭同條生兮有數同條死兮無多末後句祇這是風舟載月浮秋水天童覺雪老大開方便路低頭𨚫入菴中去者僧有眼恰如盲𨚫被巖頭行一步者僧好休不肯休依然依路去悠悠元來不會雪峰意𨚫被巖頭甕頭天童覺龍吟枯木菴中出天上人間無等匹虎嘯巖頭石上來晴空忽送一聲雷堪笑春池猶拾礫空山空到又空回佛心才露面出來猶不識低頭歸去更難知那堪末後一句子直到於今四海疑保寧勇雙明復雙暗獨立絶殊方乘機覿靣提其鋒安可當同條生兩鏡相照無能名不同條死鐵樹花開亘今古末後句始到牢關拈𨚫門前大案山圓悟勤末後句為君說踏著稱鎚硬似鐵寒則普天寒熱則普天熱若是達磨兒孫各各自知時節知時節為君說九尾烏莫當鼇山石鱉佛鑑勤雪峰費盡平生力懵懂禪和意轉疑可憐末後一句子巖頭土上更加泥龍門遠同條生兮不同死弟既耳聾兄目瞽家門蕩盡徹骨窮𨚫把黃金如糞土末後句休莾鹵甜者甜兮苦者苦北海心雪峰一日升座衆集定師輥出木毬玄沙遂捉來安舊處頌曰雪峰輥毬孰辨機一千五百幾人知眨起眉毛千萬里須是吾門師子兒北塔祚天兮寬地兮濶雪峰輥毬幾忉怛一輥直上須彌山無量人天眼開豁眼開豁脫𨚫多年臭皮襪步行走馬到新羅報道花須連夜發天衣懷雪老平生好輥毬輥來輥去輥無休一千五百人同戲誰解輸機賽一籌佛國白收來輥去事方圓獨許漁郎上釣船明月蘆花同一色落霞孤鶩共遙天夢菴信象骨木毬一輥出三世如來能事畢可憐天下遍參尋只道黃連不是蜜石䂬明輥向人前事未休再安舊處有來由一聲斷雁鳴雲漢兩𡶨蕭蕭蘆荻秋戴無為一作雪峰因玄沙來三箇一時輥出沙便作偃倒勢師曰尋常用幾箇曰三即一一即三頌曰團團輥出沒來由不立名模見便休三一一三重注腳螺江依舊向東流圓覺演山寺裏頭無可作輥出木毬兩三箇不獨玄沙遭一攧雪峰老人亦話墮懶菴樞雪峰上堂南山有一條鱉鼻蛇汝等諸人切須好看長慶出曰今日堂中大有人喪身失命雲門以拄杖攛向師前作怕勢有僧舉似玄沙沙曰須是稜兄始得然雖如是我即不然曰和尚作麼生沙曰用南山作麼頌曰象骨巖高人不到到者須是弄蛇手稜兄備師不奈何喪身失命知多少韶陽知重撥草南北東西無處討忽然突出拄杖頭拋對雪峰大張口大張口同閃電剔起眉毛還不見如今藏在乳峰前來者一一看方便師高聲喝云看腳下雪竇顯臨濟喝兮德山棒子胡狗兮誰敢向未若南山鱉鼻蛇一千五百衲子喪韶陽本色弄蛇手自古及今曾未有忽然放出若星流象骨禪翁遭一口正覺逸象骨鱉蛇當大路稜師可惜便亡身雲門弄得雖然活爭似南山不用親白雲端打鼓弄琵琶相逢一會家雲門能合調長慶解隨邪古曲非音律南山鱉鼻蛇何人知妙訣的子是玄沙真淨文玄沙太剛長慶少勇南山鱉鼻死無用風雲際會頭角生果見韶陽下手弄下手弄激電光中看變動在我也能遣能呼於彼也有擒有縱底事而今付阿誰冷口傷人不知痛天童覺象骨老人示徒擬議遭他一口韶陽突出驚人未免傷鋒犯手尼無著總雪峰示衆曰飯籮邊坐餓死人臨河渴死漢玄沙云飯籮裏坐餓死人水裏沒頭浸渴死漢雲門云通身是飯通身是水頌曰通身是飯通身水饒舌沙彌下口難悟得頓除飢渴念迷時往往更求餐本覺一雪峰示衆曰大地撮來如粟米粒大拋向面前漆桶不會打鼓普請看長慶問雲門曰雪峰與麼道還有出頭不得處麼門曰有曰作麼生門曰不可總作野狐精見解又曰狼籍不少頌曰牛頭沒馬頭回曹溪鏡裏絶塵埃打鼓看來君不見百花春至為誰開雪竇顯睂毛鏬裏遊南嶽大海波心泛釣舟薄藝隨身終不說從他打鼓看無休白雲端疾焰過風奔流度刃唱拍相隨拳踢相應驀然轟起震天雷百草頭顛春色回圓悟勤打鼓普請看直得睂毛寒拾得寒山舞笑倒老豐干楚安方撥動乾坤步轉移南觀北斗有誰知金烏暮向西山急曉逐扶桑半夜飛石門易天不能蓋地不能載簉破靣門漆桶不會鐵船同駕入滄溟持得驪珠如斗大佛心才雪峰一日登座召衆曰看看東邊底又曰看看西邊底汝若要會拈拄杖擲下曰向這裏會取頌曰東邊覷了復西觀拄杖重重話歲寒帶雨一枝花落盡不煩公子倚闌干冶父川雪峰與玄沙行次師指面前地曰這一片田地好造一箇無縫塔沙曰高多少師上下顧視沙曰人天福報即不無和尚靈山受記未夢見在師曰你作麼生沙曰七尺八尺琅琊覺云國清才子貴家富小兒嬌圓悟云要神通妙用須𠫵雪峰要田地穩密須𠫵玄沙更有一箇不涉二途諸人還委悉麼須彌頂上擊金鐘頌曰父子同行相將入草起無縫塔功高策巧帶水拖泥漏逗不少雖然落七落八爭奈有道理好佛燈珣指出長生地不迷造成無縫塔巍巍大家從此無餘事渴飲飢餐且度時野菴璇雪峰示衆曰三世諸佛向火焰上轉大法輪玄沙云近日官令稍嚴師曰作麼生沙云不許人攙行奪市師不覺吐舌雲門云火焰為三世諸佛說法三世諸佛立地聽頌曰火焰騰輝說最親無邊諸佛近前聞誰知更有傍觀者鼻孔撩天不喜君白雲端一堆猛焰亘天紅三世如來在此中轉大法輪今已了睂毛眨上起清風保寧勇紅焰光中也大奇明明演說白毫輝可憐雪老并韶石燒𨚫睂毛總不知普融平阿誰踏著雪峰蹤三世諸佛火焰中賴有雲門相暖熱火星吹得滿堂紅慈受深將謂猴白更有猴黑互換投機神出鬼沒烈焰亘天佛說法亘天烈焰法說佛風前剪斷葛藤窠一言勘破維摩詰圓悟勤三世諸佛轉法輪一大藏教說不盡象骨當機正令行玄沙見機行正令或說或聽聞不聞電捲星飛誰與論撥轉那邊關捩子睂毛留得兩莖存瞎堂遠有是父兮有是子同條生也同條死三世如來烈焰堆互換說法元如此莫顛言休倒語截斷葛藤須薦取石菴玿雪峰普請往寺莊路逢獼猴師曰這畜生一人背一面古鏡摘山僧稻禾僧曰曠劫無名為什麼彰為古鏡師曰瑕生也曰有什麼死急話端也不識師曰老僧罪過頌曰人人有面古鏡何法門而不罄𠫵玄上士迷頭緝線老婆頓證興教壽堪笑山翁不識羞為他頭上更安頭巖前跳躑無尋處一片殘霞曉未收保寧勇大地為爐冶何年鼓鑄功圓同諸佛面高鑑十方空祖印明鑒覺未萌全體現才分鑑照便成瑕要知瑩徹圓明處長短青黃總不差白楊順雪峰在洞山作飯頭淘米次山問淘沙去米淘米去沙師曰沙米一時去山曰大衆喫箇甚麼師遂覆𨚫米盆頌曰滿鉢盛來一物無豈同香積變珍蘇日月竝輪長不照木人舞袖向紅爐投子青乖龍作雨非意測猛虎挾物不露迹洞山雪老共相酬寥寥千古無人識伊菴權雪峰因僧問我眼本正因師故邪時如何師曰迷逢達磨曰我眼何在師曰得不從師頌曰達磨迷時在少林今人不曉為傳心堪羡迷人逢達磨孟冬過後又新春天衣懷裂破古今沒窠臼當機大闡血盆口腳尖躍出佛如麻李四張三無路走或菴體雪峰因僧問寂寂無依時如何師曰猶是病曰轉後如何師曰船子下楊州頌曰寂寂無依病正深雪老當年痛處針一喚喚回春夢破千山渾作木龍吟自得睴雪峰示衆云此事不從齒吻得不從黃卷上得不從諸方老宿得合從甚麼處得也須仔細頌曰一滴真珠紅潑醅殷勤相勸兩三回到頭欲盡東君意吞𨚫臨行上馬杯皖山𤁒雪峰因僧問古澗寒泉時如何師曰瞪目不見底曰飲者如何師曰不從口入僧後到趙州舉此話州曰不從口入不可從鼻裏入僧𨚫問古澗寒泉時如何州曰苦曰飲者如何州曰死師聞得乃曰趙州古佛遙望作禮自此不答話頌曰古澗寒泉浩渺瀰分明枝派暗流時不從口入無滋味苦死令渠話不知雲蓋昌黯黯雲攢覆雪峰青青趙老一雙瞳從前汗馬無人識只要重論蓋代功寶峰照縱奪還他老作家奔流度刃數如麻深深淵裏無人到飲者重添眼裏沙佛心才鮑老當年笑郭郎人前舞袖太郎當及乎鮑老出來舞依舊郎當勝郭郎真淨文趙州象骨嚴舉世無倫擬共撫沒絃琴千載清人耳古澗寒泉瞪目凝然不從口入飲者忘筌重出語苦又死不答話同彼此相逢兩會家打鼓弄琵琶箇中誰是的白鳥入蘆花圓悟勤雪峰古澗泉深趙州石橋水苦若知異水同源飲者不妨疑悟不從鼻孔入白浪高三級從此不答話豈免酬高價金剛圈子栗棘蓬解透橫行四天下佛性泰雪峰曰世界濶一尺古鏡濶一尺世界濶一丈古鏡濶一丈玄沙指火爐曰濶多少師曰如古鏡濶沙曰老和尚腳根未點地在頌曰世界能將古鏡齊言中辦的𨚫成迷白雲起處青山秀天曉依前月落西象田卿十方世界一靣鏡鏡裏看形未足真摸著鼻頭渠是我那時方見本來人懶菴樞雪峰聞一僧在山下卓菴多年不剃頭畜一長柄杓溪邊舀水時有僧問如何是祖師西來意主曰溪深杓柄長師聞得乃曰也甚奇怪一日將剃刀同侍者去訪才相見便舉前話問是菴主語否曰是師曰若道得即不剃你頭主便洗頭跪師前師即與剃頭頌曰當言不避截舌當爐不避猛火趂手作得家生到老自能穩坐水深杓柄長舀水洗頭剃雪峰刀上眼忽開琉璃殿裏無關閉月堂昌雪老垂慈肯訪他一毫頭上辨龍蛇須知不涉言詮外脫體風流出當家東山源雪峰因閩帥施銀交牀僧問曰和尚受大王如此供養將何報答師以手托地曰少打我近訛作輕打我僧問踈山曰雪峰道少打我意作麼生山曰頭上插瓜虀垂尾腳跟齊頌曰大王信重送交牀傍問禪徒太著忙下手低聲言少打劣中全勝阿誰詳洞山聰因問如何報主恩舉畢全收坐要津船頭若有風浪動滿目流沙不見人汾陽昭得人一牛還人一馬投之報之風流儒雅如今大有受恩人不知誰是報恩者正覺逸不知將底報君恩風起江湖水皺痕一片古帆乘興去與誰相逐過天門保勇此旨流行七十年多人言論少人甄托地便令輕打我認著依前又更顛般若柔受施兩邊皆是幻臨機何不惜睂鬚也知此外無長伎咄這黔州老瞎驢寶葉源雪峰因閩王封柑橘各一顆遣使送至柬問既是一般顏色為甚麼名字不同師遂依舊封回王復馳問玄沙沙將一張紙蓋𨚫頌曰柑橘閩王親手封將來直問擊宗風長人入水分明在更問玄沙又不通汾陽為汝開天路寶坊金界碧霄空汾陽昭閩王兩般馳獻上雪峰一等倒封回人情上下俱周美免把完全更擘開保寧勇柑橘將來不用疑鐵牛蚊子咬應癡閩王猶未識師旨更請玄沙下一錐延壽慧分明柑橘勿譊訛獻花借水辨龍蛇白紙一張都蓋了免教天下動干戈冶父川一般顏色兩般名紙蓋難謾衆眼睛雪嶺當時便封轉閩王猶未息疑情橫川珙雪峰示衆曰盡大地是個解脫門把手拽伊不肻入時有一僧出曰和尚怪某甲不得又一僧曰用入作甚麼師便打頌曰大地是個解脫門三世諸佛一口吞將為雪峰有奇特𨚫來謾我好兒孫懶菴樞雪峰因僧問緊要處乞師指示師曰是甚麼僧於言下大悟雲門云雪峰向你道什麼頌曰雪峰騎駿馬雲門跨驢兒一踢一踏相奔馳長安有路非無路夜半行時人不知圓悟勤無量劫來是個甚麼覿靣全提幾乎蹉過不蹉過土苴堆頭且高臥雪峰一日在僧堂內燒火閉𨚫前後門乃叫曰救火救火玄沙將一片柴從窗櫺中拋入師便開門頌曰巨嶽塵飛蟭螟生兒兒落塵裏如錐錐泥燒火救火閉門開門拋柴家醜外頭見萬象森羅一口吞月堂昌高燒榾柮暖通身快活難禁一屋春不是謝郎來合火誰知門外有寒人石林鞏雪峰問僧甚麼處來僧曰浙中來師曰船來陸來曰二途俱不涉師曰爭得到這裏曰有什麼隔礙師打趂出僧過十年後再來師又問甚處來曰湖南師曰湖南與這裏相去多少曰不隔師竪起拂子曰還隔這個麼曰若隔即不到也師又打趂出此僧住後凡見人便罵師一日有同行聞特去訪問兄到雪峰有何言句便如是罵他遂舉前話被同行㖃叱與他說破這僧當時悲泣嘗向中夜焚香遙禮頌曰戴角擎頭去復來雪庭兩見戰旗開軍前不誤將軍令空有英雄出九垓九垓雖出有牢關未透牢關未足觀棒頭有眼明如日要識真金火裏看佛燈珣見說閩山多蠱毒千方百計避無由殤中既有催魂鬼一命還他方始休虗堂愚雪峰普請次自負一束藤路逢一僧便拋下僧擬取師一踏踏倒歸舉似長生曰我適來踏得者僧甚快長生曰和尚須替者僧下涅槃堂始得雪竇云長生大似東家人死西家人助哀也好與一踏頌曰暗拋香餌在江果是金鱗釣得歸不是絲綸收得疾幾乎輸與鷺鷥兒上方益偉哉雪老法中英肩上藤薪覿靣呈目前不薦當頭著和身一踏倒囊傾會知擔重因柴束自然便重不便輕何山奉報諸禪侶孩兒須是的親生佛燈珣雪老擔藤憩歇時一僧才見便慈悲近前擬取攔胸踏舉似長生更一椎石門聰雪峰踏者僧不殺長生扶者僧不起可憐一束爛枯藤狼藉至今愁滿地西巖惠雪峰與玄沙夾籬次沙曰夾籬處還有佛法也無師曰有曰如何是夾籬處佛法師撼籬一下沙曰某甲不與麼師曰子又作麼生曰穿取頭過來頌曰父子相擕入故園頭時過短籬邊爛泥有刺無人見踏著方知腳底穿懶菴樞雪峰因三聖問透網金鱗以何為食師曰待汝出網來向汝道聖曰一千五百人善知識話頭也不識師曰老僧住持事繁頌曰透網之魚不上鈎貪游浪水認浮頭高灘坐釣垂慈者回棹收綸𨚫上舟汾陽昭透網金鱗休云滯水搖蕩乾坤振鬣擺尾千尺鯨奔洪浪飛一聲雷震清颷起清颷起天上人間知幾幾雪竇顯張三賣物高擡價李四還依市價酬交易不成猶作閙李公店鋪一時休海印信老倒漁翁坐釣臺金鱗赫赫鼓波來海門空濶才施網霹靂一轟天地開真淨文放去收來得自由不堪憂處亦堪憂可憐滯句承言者爭是爭非空白頭透網金鱗掣電機休云滯水與拖泥雷霆一擊青霄裏傾湫何處不滂瀰真如哲出網分明向道休風雲會處有來由雷霆昨夜聲相應依舊為霖遍九州圖通仙擭浪拏雲勢可驚平空驟雨似盆傾不因放𨚫淮河閘九曲潮頭卒未平上方益洞裏無分別有天桃花似錦柳如綿仙家不會論冬夏石爛松枯是一年五祖演鯤鯨已插摩霄翼海客猶懸釣月鈎不顧翻空洪浪惡一帆風信出鼇頭佛心才全死中全活全活中全死一個訝郎當一個福建子徑山杲金鱗透網欲吞舟一向衝波逆水流𨚫被漁翁閒引釣隨波逐浪謾悠悠鼓山圭俊鶻冲天寒雞曉眠脫略窠窟遲速不偏截斷命根急處放當頭手腳緩時樣滴水冰生不認渠坐籌幃幄江海量君不見透網金鱗活計新住持事繁笑殺人月堂昌百草頭出沒三界外遨遊徒布漫天網虛下釣鼇鈎搖鱗振鬣撼乾坤兀自昻頭洪浪噴棒兩點喝雲奔肻將爭戰定功勛圓悟勤張猴白李猴黑硬如綿軟如鐵驀路相逢兩會家臨濟未是白拈賊遁菴演新羅拄杖遂寧鉢衲子家風那個無一等看來如墨黑誰能重與較錙銖虗堂愚雪峰問僧近離甚處曰覆船師曰生死海未渡為甚麼覆𨚫船僧無語乃回舉似覆船船曰何不道渠無生死僧再至進此語師曰此不是汝語曰是覆船恁麼道師曰我有二十棒寄與覆船二十棒老僧自喫不干闍黎事頌曰未渡生死海不應覆𨚫船渠本無生死超然離二邊長如杲日麗中天舒光照到雪峰前圓悟勤生死海中猶未渡傳言送語幾千程一棒打翻東海鯉迷人直下便狂惺尼無著總雪峰上堂舉拂子曰遮個為中下僧問上上人來如何師舉拂子僧曰遮個為中下師打之或作拈起拄杖雲門曰我不似雪峰打葛藤驀拈拄杖云我這個只為中下機人有僧問忽遇上上人來時如何門便打頌曰迅雷不及掩耳下椿要在急水水深樁腳若長耳畔雷聲四起拈起拄杖為他中下上上人來放過不打秦人一入桃花源子孫千世為神仙月堂昌大機圓應大用直截雪峰雲門只得一橛畢竟如何不說不說松源嶽雪峰因閩王問擬欲蓋一所佛殿去時如何師曰大王何不蓋取一所空王殿曰請師樣子師展兩手雲門云一舉四十九頌曰空王殿樣子雪峰展兩手添得老韶陽一舉四十九總是南看北斗即菴覺雪峰送南際長老出乃作女人拜際斂手應諾諾師以手斫額便歸頌曰送客隨家豐儉施盡情為餞免生疑𨚫蒙惠重過相贈斂手遙知向暮歸投子青保福因雪峰上堂曰諸上座望州亭與汝相見了也烏石嶺與汝相見了也僧堂前與汝相見了也師舉問鵝湖僧堂前相見即且置秪如望州亭烏石嶺甚麼處相見鵝湖驟步歸方丈師低頭入僧堂頌曰望州烏石與堂前相見相逢萬萬千唯有鵝湖并保福此時相見解推遷汾陽昭望州烏石常見見何故禪人𨚫背違保福鵝湖雖得意埋兵曾未展鏘旗海印信登山過水幾區區特地相逢問道途堪笑華山陳處士長安路上倒騎驢大洪遂密密堂堂早二三本來無物更何堪癡人見了生歡喜作者相逢滿慚龍門遠望州烏石與僧堂業識茫茫不可當提起衲僧拄杖子五湖四海沸如湯徑山杲藕絲引鯨鼇針鋒輥芥投望州烏石嶺未唱已先酬大唐擊鼓新羅舞覿靣相呈不相覩圓悟勤望州烏石僧當前驟步低頭隔大千若是咬人師子子反身不在草頭邊一翁如保福因僧問雪峰平生有何言句得似羚羊掛角時師曰我不可作雪峰弟子不得頌曰人前慣出手退三添作九一眼未嘗看無家自能走雪峰之句羚羊掛角作他弟子沒來由龍蛇陳上看謀略月堂昌雪峰未審何言句得似羚羊掛角時拊擊自然皆率舞不須羌管隔雲吹虗堂愚鏡清問雪峰古人有言峰便倒臥良久起曰問甚麼清再問峰云虗生浪死漢頌曰尋常愛客恨無來及至人來懶話陪空臥早知眠不當虛勞紅熖落寒灰投子青雲菴真淨禪師黃龍南之的嗣也上堂舉雪峰云南山有條鱉鼻蛇你等諸人出入好看師云雪峰無大人相然則蛇無頭不行長慶恰如個新婦兒怕阿家相似便道堂中今日大有人喪身失命雲門拽拄杖攛向雪峰前作怕勢師云為蛇畫足玄沙云用南山作什麼師云道我見處親切不免只在窠窟裏更無一人有些子天然氣槩報寧門下莫有天然氣槩底麼不敢望你別懸慧日獨振玄風且向古人鶻臭布衫上知些子氣息也難得天童應菴禪師上堂舉趙州和尚一日見僧來便靣壁書梵字僧展坐具禮三拜州轉身僧收坐具便行州云苦苦僧撫掌呵呵大笑師云苦苦苦中苦樂中苦誰道黃金如糞土象骨老師曾輥毬祕魔杈下捉老鼠天寧楚石禪師雪峰贊云對衆輥木毬當場拈鱉鼻明明出胸襟一一蓋天地覺範禪師智證傳云雪峰函蓋乾坤句截斷衆流句隨波逐浪句傳曰宗師約法以定綱宗以簡偏邪如雪峰三句玄沙嘗言之曰是汝諸人見有嶮惡見有大蟲刀劒諸事來逼汝身命便生無限畏怖恰如世間畫師自畫作地獄變相畫大蟲刀劒了好好地看著𨚫自生怕怖亦不是別人與汝為過汝如今欲免此幻惑麼但識取金剛眼睛若識得不曾教有纖塵可得露現何處更有虎狼刀劒解嗋嚇得汝直至釋迦如是伎倆亦覓出頭處不得所以我向汝道沙門眼把定世界函蓋乾坤不漏絲髮何處更有一物為汝知見如是出脫如是奇特何不究取此函蓋乾坤句也又曰鐘中無鼓響鼓中無鐘聲鐘鼓不交參句句無前後如壯士展臂不借他力如師子遊行豈求伴侶此截斷衆流句也又曰大唐國內宗乘未有一人舉倡設有一人舉倡盡大地人失𨚫性命無孔鐵鎚相似一時亡鋒結舌去汝諸人賴我不惜身命共汝顛倒知見隨汝狂意方有申問處我若不共汝與麼知聞去汝向什麼處得見我此隨波逐浪句也大慧普覺禪師上堂舉雪峰透網金鱗以何為食師云二尊宿一人粗似丘山一人細如米末雖然粗細不同稱來輕重恰好徑山今日真實告報汝等諸人切勿鑽龜打瓦大慧普覺禪師舉僧問古澗寒泉時如何師云雪峰不答話疑殺多少人趙州道苦赤不如語直若是妙喜即不然古澗寒泉時如何到江扶櫓棹出嶽濟民田飲者如何清凉肺腑此語有兩負門若人辨得許你具參學眼大慧普覺禪師示衆舉大王向雪峰會裏請神晏住鼓山雪峰曰好一隻聖箭折𨚫也師云衆中商量道甚麼處是聖箭折處云鼓山不合答他話是聖箭折處鼓山不合說道理是聖箭折處恁麼批判非惟不識鼓山亦不識孚老殊不知孚上座正是一枚賊漢於鼓山納一場敗闕㦬而歸𨚫來雪峰處拔本大似屋裏販楊州若非雪峰有大人相這賊向甚處容身當時可惜放過𨚫成不了底公案只今莫有為古人出氣底試出來我要問汝甚麼處是聖箭折處普覺禪師到雪峰值建菩提會請普說問話畢乃云菩提宿將坐重圍劫外時聞木馬嘶寸刃不施魔膽碎望風先已豎降旗雪峰法窟真歇場中人人懷報佛報祖之心個個抱安國安家之略智如鶖子辨若滿慈雲門今日到來只得結舌有分然官不容針私通車馬既到這里不可徒然略借主人威光與大衆赴個時節遂拈起拄杖云還委悉麼天高羣象正海濶百川朝普覺禪師舉雪峰望州亭相見頌云望州烏石與僧堂業識茫茫不可當提起衲僧拄杖子五湖四海沸如湯普覺曰昔靈雲見桃花悟道曰從緣悟達永無退失又雪峰自作塔銘曰從緣有者始終而成壞非從緣得者歷劫而常堅此二尊宿所見且道是一般是兩般若道是一般一人以從緣而得為是一人以從緣而得為非若道兩般不可二大老各立門戶疑惑後人鵝王擇乳素非鴨類知立禪人還知二大老落處麼若不知雲門直為汝說破二由一有一亦莫守一心不生萬法無咎已上兩假不同收歸上科天童覺和尚舉雪峰透網金鱗頌曰浪級初升雲雷相送騰躍稜稜看大用燒尾分明度禹門華鱗未肻淹虀甕老成人不驚衆慣臨大敵初無恐泛泛端如五兩輕堆堆何啻千鈞重高名四海復誰同介立八風吹不動天童舉雪峰在德山作飯頭頌曰末後句會也無德山父子太含胡座中亦有江南客莫向人前唱鷓鴣雪峰巖頭欽山自湘中入江南至新吳山之下欽山濯足澗側見菜葉而喜指以謂二人曰此山必有道人可沿流尋之雪峰恚曰汝智眼太濁他日如何辨人彼不惜福此住山何為哉雪峰東山空禪師答余才𦮠書向辱枉顧荷愛之厚別後又承惠書益自感愧某本巖穴間人與世漠然才荗似知之今雖作長老居方丈只是前日空上座常住有無一付主事出入支籍竝不經眼不畜衣鉢不用常住不赴外請不求外援任緣而住初不作明日計才茂既以道舊見稱故當相忘於道今書中就覔數腳夫不知此腳夫出於常住耶空上座耶若出於空空亦何有若出常住是私用常住一涉私則為盜豈有善知識而盜用常住乎公既入帝鄉求好事不宜於寺院營此等事公閩人所見所知皆閩之長老一住著院則常住盡盜為己有或用結好貴人或用資給俗家或用接陪己知殊不念其為十方常住招提僧物也今之戴角披毛償所負者多此等人先佛明言可不懼哉比年已來寺舍殘廢僧徒寥落皆此等咎願公勿置我於此等輩中公果見信則他寺所許者皆謝而莫取則公之前程未可量也逆耳之言不知以謂如何時寒途中保愛林間録助刻寺志芳名賴孝卿銀二拾兩鄭崇絢銀二拾兩吳武卿銀二拾兩陳衍尊銀一拾兩曾昌谷銀叄兩正陳秀珠銀二兩正陳秀相銀二兩正勸緣吳梁卿
