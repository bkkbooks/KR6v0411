body:
  text: 郡人徐𤊹纂輯林弘衍叅定鄭天綵賴亨侯吳興漢重訂紀生植繄彼南中厥包橘柚入山既深厥土彌厚靈藥異花珍禽恠獸品物流形何嫌雜揉紀生植第七穀之屬稉秫麥麻豆蕎麥𮮐木之屬松栢檜樟黃楊榕桂柟楩梓椿檉楝楓杉桐桑椶櫚柳橡其子可食竹之屬奯竹麻竹方竹石竹江南竹觀音竹紫竹斑竹綿竹白箬竹藥之屬芝黃精茯苓枸杞茱萸紫蘇香薷天門冬麥門冬栝樓使君子石菖蒲益母草何首烏車前子茶梔子花之屬風蘭生於巖隙或寄生蕙杜鵑花萱草茉莉素馨山丹長春海棠闍提石榴百合金燈白長春佛桑葵菊木槿雞冠山茶仙菊一名西番蓮十月開山中最多色絕紫金鳳金錢芙蓉水仙紫薇刺牡丹山中處處有之紫荊玉釵回頭顧子蔬之屬芥菘蘿蔔萵苣甕菠稜苦蕒莙薘茄莧蕨薑冬瓜匏芹芋山藥薯果之屬橄欖柑橘柚佛手柑楊梅枇杷甘樜芭蕉棗栗瓜柿銀杏石榴梨桃李黃彈葡萄鳥之屬白鷼喜鵲黃雀鳩黃鶯燕竹鷄鷓鴣雉鴉白頭公鷹啄木鴝鵒翠杜鵑閩中惟此山有之獸之屬麂鹿麞猴兎狸竹䶉穿山甲論曰鳥獸草木隨地而產品類弗齊風氣殊也吾郡以西所產與東南稍異雪峰厥土高寒荔子輕紅地不宜植而琪葩瑤草瑞獸祥禽往往有之至若良材盤錯嘉穀豐登可資民生之日用者尤以是山為淵藪泉甘壤沃實稱奧區不徒佛地清凉但供緇流修習而已
