body:
  text: 郡人徐㶿纂輯林弘衍參定鄭天綵賴亨侯吳興漢重訂紀禪宗獦獠開堂南嶽嗣法燈焰相承宗風四達拂𥪡槌拈毬拋棒喝千古慧心普傳衣鉢紀禪宗第三真覺大師年譜唐穆宗長慶二年壬寅師泉州南安縣曾氏子父勉家世奉佛其先塋在楊山西去城四十五里一峰翔拜於前俗謂胡僧設拜形相墓者卜其地出高僧師生酷惡葷腥襁褓中聞鐘梵聲或見旙花像設必為動容見者咸異之長慶三年癸卯長慶四年甲辰敬宗寶曆元年乙巳寶曆二年丙午文宗泰和元年丁未泰和二年戊申泰和三年己酉泰和四年庚戌師九歲懇父母求出家不從其請泰和五年辛亥泰和六年壬子泰和七年癸丑師十二歲從父遊莆田玉澗寺見慶玄律師遽拜曰我師也遂留侍焉泰和八年甲寅泰和九年乙卯開成元年丙辰開成二年丁巳開成三年戊午師十七歲祝髮改名義存開成四年己未開成五年庚申武宗會昌元年辛酉會昌二年壬戌會昌三年癸亥會昌四年甲子會昌五年乙丑師二十四歲是年有旨沙汰僧徒師以儒服謁福州芙蓉寺弘照訓禪師見而器之留之左右會昌六年丙寅師二十五歲是歲武宗崩沙汰之令赦已宣宗大中元年丁卯師二十六歲是歲奉詔還佛師再禮芙蓉弘照為師大中二年戊辰大中三年己巳師二十八歲往幽州寶剎寺受戒大中四年庚午大中五年辛未師三十歲是歲五月九日弘照禪師示寂大中六年壬申大中七年癸酉師三十二歲辭曾氏遊方有偈曰昔年曾許鬱多羅直至于今未動梭此日且隨雲水去誰能待得鴨成鵝遂同巖頭奯公在大慈寺寰中會下及寰中上足欽山文邃為友至江西三登投子山九上洞山師嘗在洞山作飯頭一日師淘米洞山問云先去砂先去米師云砂米一時去山云大衆喫箇甚麼師覆𨚫盆子山云子因緣不在此遂去參德山大中八年甲戌大中九年乙亥大中十年丙子大中十一年丁丑大中十二年戊寅大中十三年己卯懿宗咸通元年庚辰師年四十參德山師問德山從上宗乘中事學人還有分也無德山打一棒云道什麼師此時豁然如桶底脫相似咸通二年辛巳咸通三年壬午咸通四年癸未師年四十二在德山作飯頭一日飯遲德山自掌鉢至法堂上師見云老漢鐘未鳴鼓未響托鉢向什麼處去德山便回師舉似巖頭頭云大小德山不會末後句山聞令侍者喚巖頭至方丈問你不肻老漢那巖頭密啓其意山至來日上堂與尋常不同巖頭到僧堂前撫掌大笑云且喜得老漢會末後句天下人不奈伊何咸通五年甲申咸通六年乙酉咸通七年丙戌師年四十五同巖頭欽山欲參臨濟至中路逢定上座云臨濟和尚已于四月初十日示寂師云某等薄福不及見和尚未審有何言句定舉無位真人話自是三人分袂巖頭往龍山欽山止于澧陽師還閩道由建安結菴居之今黃龍雙石二寺是也咸通八年丁亥咸通九年戊子師年四十七追念芙蓉乃初進之地遂還福州止于芙蓉之石室是歲溈山大安禪師領徒至廉帥李景以書請開創城西怡山王霸仙人上升之所即今之西禪長慶寺也咸通十年己丑師年四十八宴坐芙蓉石室其徒有勸其出山者師深拒之時有同學僧行實謂師道德隆重非鷲嶺猴江之勝不足以居議以象骨峰為師栖止師頷之咸通十一年庚寅師年四十九是歲暮春行實以象骨峰詣諸耆舊求卜精藍時山之東信士方訓謝俲陳佐競為緣首願奉祇園而洪元表亦以財施遂創菴于柳洋涼映臺之北迎師居之既至據坐而喜謂行實曰勞汝擇焉吾其終老于此矣是冬師偕行實陟于峰頂周覽形勝或謂樵者得象骨于峰巔或謂是山四時皆雪二名兼稱師笑曰可其上三百步得勝地先是行實買菴基于方訓方以山林為施而謝俲陳佐亦樂捨資財自是檀度輻輳置田業寖廣矣咸通十二年辛卯師年五十大興雪峰院宇至于木人效勞衆以為喜咸通十三年壬辰咸通十四年癸巳師年五十二營造土木之暇隨機演唱未嘗少懈衲子雲集至無所容禧宗乾符元年甲午乾符二年乙未師年五十四閩觀察使韋公岫捨錢三百緡為建造費自庚寅至是歲凡六載院宇大備僧朗詣闕請院額時遇應天節乃賜額應天雪峰禪院乾符三年丙申師年五十五寄書與巖頭云自從鼇山成道後直到而今飽不飢乾符四年丁酉師年五十六因遊寺外遂至陳洋乃曰吾首達茲山得三境界此其三也可為建塔之所今之塔基即是乾符五年戊戌師年五十七自浙入閩陷破郡邑師在山中鹽官稜道者來參乾符六年己亥廣明元年庚子中和元年辛丑師年六十徒衆盈千五百人凡來參者便滾出三箇木毬一留寢室二藏塔中是歲備頭陀出世住楊溪場普應寺後遷玄沙即玄沙祖師也中和二年壬寅師年六十一廉帥李景捨錢一十萬緡司空頴川陳公巖捨錢三百緡觀察使晉國韋公岫捨錢二十萬緡置太平王坂莊致仕隴西李公捨錢一百三十八貫繼創城西大睦廨寺是歲有內官自閩回京言師之道德欽承僖宗皇帝詔福州所司具師道行時閩士陳延郊疏其實以奏賜號真覺大師并紫袈裟中和三年癸卯中和四年甲辰光啓元年乙巳光啓二年丙午光啓三年丁未師年六十六四月八日岩頭遭難大叫一聲聞數十里命終闍維舍利無數師聞而悲之光啓四年戊申昭宗龍紀元年己酉師年六十八開基造塔于陳洋即前所謂第三境界七月七日塔成師自作銘時行實示寂師哭之慟舉其全身葬于山之西原師為塔記云身謝有為塔歸無縫松山一鎮鶴嶺千秋行實俗姓高浙之永嘉人也受業芙蓉山自咸通己丑年啓創茲山時行實明地理破天荒立山門放水路原始要終其功不淺是年八月十四日終于舊院壽六十七臘三十六天順元年庚戌天順二年辛亥師年七十再遊吳越初抵天台湧泉景福元年壬子師年七十一夏止靈隱後至國清復到浮江次遊育王各有問答機緣景福二年癸丑乾寧元年甲寅師年七十三復歸于閩止于陳洋塔所府司徒郎公延請府中為説玄要即施財建法堂于塔亭是歲遷寺于陳洋今寺即此處也時有嗣法玄沙備鵝湖孚洞巖休長慶稜雲門偃鼓山晏等一十二人今傳燈録載四十六人餘失其名乾寧二年乙卯師年七十四領衆南遊時黃涅槃預知師至搘策造前途接之抵蘇溪師問曰近離什麼處槃云離辟支巖師云巖中還有主麼槃以竹策扣師簥師乃出簥相見槃云曾郎萬福師遽展丈夫拜槃亦作女人拜師云莫是女人麼槃又設兩拜遂以竹策倒地右繞師簥者三云某三界內人師三界外人師宜前去某後來槃乃先回師遂去至囊山憩數日槃供侍隨行禪徒一無所缺次至瓦棺時泉州太傅王延彬創東彌勒資壽等院迎師駐錫大加禮敬閩王王審知執權霸位嚮師道化嘗領千衆于東西第為王説法初捨俸錢二十萬創橫屋二十間次捨錢三十萬創造法堂廊廡方丈等宇乾寧三年丙辰乾寧四年丁巳光化元年戊午師年七十七閩王請師同玄沙入內論佛心印王聞二師如此開示起大信心便立大誓願皈心受持終無退志二師于內講論佛法重排香案不許外泄仍令內尚書三人隔帳録其法語師乃請諸佛龍天證明為王傳佛心印復捨錢四十萬鼎建大殿堂宇千百餘間莫不大備師先年首至茲山時山南東洋信士藍文卿者知師道化遂將所居東池側古柳樹創菴延師駐錫今枯木菴是也藍公復以柳洋莊創建精舍延師居之今舊院是也藍公見其衆廣復將所居之宅充為巨剎遷師主之後閩忠懿王具奏禧宗皇帝賜封檀越主藍文卿為威武軍節度使明護侯王長男應潮通祐神君弟僧守遠慈悲尊者今為本山土地其後文卿與妻楊大娘次男應辰等徙家于茆洋莊以成其志仍施田園二十莊今藍田太平大穆等莊是也光化二年己未師年七十八閩王遣使賫銀交椅送師光化三年庚申師年七十九有旨賜改本寺為應天廣福寺天復元年辛酉師年八十是歲閏六月初十日師將條件住持及僧行規制以示徒衆大約事無大小皆歸住持百川歸海衆流同源國無二王家無二主况僧居無諍有諍非僧心安人和不失其緒至于莊院塔院皆有成規老者病者理合看侍若能聲演佛事者以應外緣僧行有過者輕重量罰既非知事不許輒行杖木令人不安凡百事但依芙蓉先師規制即知其義也天復二年壬戌天復三年癸亥師年八十二寺衆日繁歲入不給屋宇漸漏欲行修葺工程浩大有僧無量無悅者立心勸募衆緣輪奐仍舊以遵師行哀帝天祐元年甲子天祐二年乙丑師年八十四閩王再施錢重建枯木菴及開大池約萬有餘工師嘗在枯木菴坐禪傍有水磨坊晒麥師親題云菴前永日無狼子磨下終年絶雀兒此師之誡諭至今無虎雀天祐三年丙寅師年八十五泉州王太傅遣使來請稜道者住持招慶寺師以書報玄沙上山送之唐祚至此為梁所篡梁太祖開平元年丁卯師年八十六師自圖塔樣令人呈獻閩王王遣使往江西瑞迹山搜致材石為師建塔及真堂三間與師造龕龕完報和尚知道師云舁向堂前著看你不奈何開平二年戊辰三月師示微疾閩王命醫診視師曰吾非疾也竟不服藥至四月二十五日師坐法堂示遺誡等事乃云當院年長有從智者共相遵受不得妄有乖張至本月二十八日謂衆曰泡幻緣生去來不定吾四十年來未嘗不苦口相勸近日佛法淡薄惟于世諦殷勤至于信施檀那師僧和尚百年終歿無善報恩世理既不相應亦合少分省察吾若四大離散之日先已有木函石龕並依舊志安排毋違我意若有披麻下淚者非我眷屬衆皆秉命共矢修營塔制苟完而蓋石未具是夕烈風雷雨震撼林壑東山之上地忽震裂廣袤尋丈其平如底舉而用之函蓋相合見者咸異五月初二日師手札百餘字別閩王復遊藍田莊暮歸是夜十八刻示寂壽八十七臘五十九至初十日建窣堵坡于本院方丈閩王遣男刑部尚書延稟入寺哀慟特諭祭禮至十五日全身入塔論曰雪峰開堂説法參座下而稱弟子者千五百人宗風之盛未有踰此者且時有忠懿國主皈依禮拜僖宗皇帝降勑賜號師之機緣宏大殆與東林慧遠彌天道安埒矣八十七年之蹤迹歷歷有徵而心印相傳則具見於語録云
