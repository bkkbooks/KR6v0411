body:
  text: 郡人徐𤊹纂輯林弘衍參定鄭天綵賴亨侯吳興漢重訂紀形勝震旦方坻羣峰秀結𡽱嶫蔽虧炎天積雪岫幌雲關星羅碁列地德炳靈四睇幽絶紀形勝第一雪峰山在福州侯官縣草九三十都宋為永安鄉嘉祥東里距郡城一百八十里而遙高四十餘里蟠據侯官羅源古田閩清四邑延袤六十餘里其山舊有樵者得象骨於峰頭名象骨峰危峭隂寒夏有積雪經暑不消初僧義存游吳楚至武陵傳法於德山乃歸閩居懷安縣之芙蓉山石室其徒蝟集有同學行實者為卜勝槩曰若鷲嶺猴江乃可於是得象骨峰形勢積高岡巒環抱乃與里人謝俲方訓陳佐輩誅茅為菴於柳洋凉映臺北導存居之一日登其巔遇大雪留宿其上閩王審知問曰師住象骨峰有何異答曰山頂暑月猶有積雪王曰是山可名雪峰此雪峰之名所繇起也既而徒衆益盛舄衲無所容遂去菴三百步別營所居即今之崇聖寺基也主山曰鳳凰岡唐禧宗乾符二年賜號真覺大師山有二十四景然不能盡是山之勝云象骨峰山之舊名唐改為雪峰鳳凰岡寺之主山也寺扆其麓烏石嶺在山之巔石色純黑不生樹木丁山距寺四十里六華峰距寺二十里一洞山在寺之東北俗呼獅子巖峭拔玲瓏草木蒙茸其上梯雲嶺在寺之東南磨香石在寺之東隅石上古刻磨香石三字鞭鬬石在寺之東隅石上刻光松頭塔四字棋盤石在羅漢巖之上虎跡石文殊臺在柳洋之東距寺五里石屋中刻有文殊像乘雲臺黃蘖希運禪師與一僧同登雪峰轉盻間其僧乘雲而去運訝視之曰早知能然當為斫其脛故名羅漢巖在雙溪距寺二十里抵寺路經於斯下有十數丈深潭上有棋盤石舊跡應潮泉在山絶頂距寺十餘里一壑澄泓廣二三尺水才數寸進退深淺與潮候無差四傍皆頑石中有數沙眼潮上則涓涓而出退則復竭相傳以為海眼卓錫泉距寺二里泉自石罅流出涓涓不竭瀑布泉在丁山奔流廣十餘丈湯泉距寺八十里地名湯院産石玲瓏䆗窱可為盆玩有溫泉自龍口流出宋僧可遵有詩云直待衆生塵垢盡我方清冷混常流蘇東坡和之云若信衆生本無垢此泉何處覔寒溫後郡守曾鞏程師孟蔣之奇諸公俱有留題萬工池在枯木菴前寬可數十畝閩王役丁夫所濬曾費萬工故名放生池在寺前萬工池下蘸月池在山門外歲久淤塞前僧墾為田萬歷七年清丈十一畝零鬻價三十金天啓七年曹亷憲學佺捐資贖回仍濬為池四傍砌石雪嶠路在枯木菴邊古鏡臺在柳洋之西論曰吾郡山水奇擅宇內雪峰僻處萬山中高淩霄漢隆冬積雪盛夏不消固非炎方所嘗聽覩閩山無象而骨委峰巔離海三百餘里而泉脉候應潮汐乘雲高僧臺址尚存瀑布千仞不讓匡山九疉則是山誠震旦之靈區釋子開士之所吐符也惟是人跡罕至雲巒霧壑未盡品題老氏有云知我者希則我貴矣山靈豈不厚幸哉
