body:
  text: 郡人徐㶿纂輯林弘衍參定鄭天綵賴亨侯吳興漢重訂紀法派宗風既普白業斯傳根稟慧鈍覺有後先支分派衍果證金仙梵輪自轉智炬常燃紀法派第四雪峰法嗣雲門文偃禪師嘉興張氏子初到雪峰莊見一僧乃問上座今日上山去那僧曰是偃曰寄一則因緣問堂頭和尚祇是不得道是別人語僧曰得偃曰上座到山中見和尚上堂衆才集便出握腕立地曰這老漢項上帶枷何不脫𨚫其僧一依偃教雪峰見這僧與麼道便下座把住曰速道速道僧無對峰拓開曰不是汝語僧曰是某甲語峰曰侍者將繩棒來僧曰不是某語是莊上一浙中上座教某甲來道峰曰大衆去莊上迎取五百人善知識來偃次日上雪峰峰才見便曰因甚麼得到與麼地偃乃低頭從茲契合溫研積稔密以宗印授焉宋乾德三年有旨詣雲門開塔真容如生髭髮皆長真身迎入大內供養逾月送歸封塔福州玄沙師備宗一禪師閩之謝氏子生長漁家年三十始出家與雪峰本法門昆季而親近若師資峰以其苦行呼為頭陀一日峰問阿那箇是備頭陀備曰終不敢誑于人異日峰召曰備頭陀何不遍參去師曰達磨不來東土二祖不往西天峰然之備入室咨決罔替晨昏又閲楞嚴經發明心地由是應機敏捷與修多羅冥契諸方玄學有所未決必從之請益至與雪峰徵詰亦當仁不讓峰曰備頭陀再來人也有語録行于世福州長慶慧稜禪師杭州鹽官孫氏子歷參禪苑後參靈雲往來雪峰玄沙二十年間坐破七箇蒲團不明此事一日捲簾忽然大悟乃有頌曰也大差也大差捲起簾來見天下有人問我解何宗拈起拂子劈口打峰舉謂玄沙曰此子徹去也沙曰未可此是意識著述更須勘過始得至晚衆僧上來問訊峰謂稜曰備頭陀未肻汝在汝實有正悟對衆舉來稜又頌曰萬象之中獨露身惟人自肻乃方親昔時謬向途中覔今日看來火裏氷峰乃顧沙曰不可更是意識著述稜問峰曰從上諸聖傳授一路請師垂示峰良久稜設禮而退峰乃微笑稜入方丈參峰曰是甚麼稜曰今日天晴好普請自此酬問未嘗爽于玄旨漳州保福從展禪師福州陳氏子年十五禮雪峰為受業師遊吳楚間後歸執侍峰一日忽召曰還會麼展欲近前峰以杖拄之展當下知歸福州鼓山神晏興聖國師大梁李氏子幼惡葷腥樂聞鐘梵一日參雪峰峰知其緣熟忽起搊住曰是甚麼晏釋然了悟亦忘其了心惟舉手搖曳而已峰曰子作道理耶晏曰何道理之有峰審其懸解撫而印之杭州龍華靈照真覺禪師高麗人也萍遊閩越升雪峰之堂冥符玄旨居惟一衲服勤衆務閩中謂之照布衲明州翠巖令參永明禪師安吉州人嗣雪峰越州鏡清道怤順德禪師永嘉陳氏子六歲不葷茹遊方抵關謁雪峰一日怤問祇如古德豈不是以心傳心峰曰兼不立文字語句怤曰祇如不立文字語句師如何傳峰良久怤禮謝峰曰更問我一轉豈不好怤曰就和尚請一轉問頭峰曰祇恁麼為別商量怤曰和尚恁麼即得峰曰于汝作麼生怤曰辜負殺人怤住越州鏡清唱雪峰之旨學者奔湊副使皮光業日休之子詞學宏贍屢擊難之退謂人曰怤師之高論人莫窺其極漳州報恩懷嶽禪師泉州人嗣雪峰福州安國弘瑫明真禪師泉州陳氏子參雪峰峰問甚麼處來曰江西來峰曰甚麼處見達磨曰分明向和尚道峰曰道甚麼曰甚麼處去來一日雪峰見瑫搊住曰盡乾坤是箇解脫門把手拽伊不肻入曰和尚怪弘瑫不得峰拓開曰雖然如此爭奈背後許多師僧何後閩帥命居安國大闡玄風泉州睡龍山道溥弘教禪師福唐鄭氏子嗣雪峰南嶽金輪可觀禪師福唐薛氏子參雪峰峰曰近前來觀近前作禮峰與一踏觀忽契悟師事十二載復歷叢林住後上堂我在雪峰遭他一踏直至如今眼不開不知是何境界福州大普山玄通禪師本郡人嗣雪峰福州長生山皎然禪師本郡人久依雪峰一日與僧斫樹次峰曰斫到心且住然曰斫𨚫著峰曰古人以心傳心汝為甚麼道斫𨚫然擲下斧曰傳峰打一拄杖而去信州鵝湖智孚禪師福州人僧問雪峰拋下拄杖意作麼生孚以香匙拋下地僧曰未審此意如何孚曰不是好種出去杭州西興化度院師郁悟真禪師泉州人嗣雪峰漳州隆壽紹卿興法禪師泉州陳氏子因侍雪峰山行見芋葉動峰指葉示之卿曰紹卿甚生怕怖峰曰是汝屋裏底怕怖甚麼卿于此有省福州仙宗院行瑫仁慧禪師嗣雪峰福州蓮華永福院從弇超證禪師嗣雪峰襄州雲蓋雙泉院歸本禪師京兆府人初謁雪峰禮拜次峰下禪牀跨背而坐本于此有省韶州林泉和尚嗣雪峰洛京南院和尚嗣雪峰越州洞巖可休禪師嗣雪峰定州法海院行周禪師嗣雪峰杭州龍興宗靖禪師台州人初參雪峰誓充飯頭勞逾十載嘗于衆堂中袒一膊釘簾峰覩而記曰汝向後住持有千僧其中無一人衲子也靖悔過回浙住六通院錢王命居龍興寺有衆千餘惟三學講誦之徒果如雪峰所記福州越山師鼐監真禪師初參雪峰而染指後因閩王請于清風樓齋坐久舉目忽覩日光豁然頓曉而有偈曰清風樓上赴官齋此日平生眼豁開方信普通年遠事不從蔥嶺帶將來歸呈雪峰峰然之臨終示偈曰眼光隨色盡耳識逐聲消還元無別旨今日與明朝乃跏趺而逝泉州福清院玄訥禪師高麗人嗣雪峰衢州南臺院仁禪師嗣雪峰泉州東禪和尚嗣雪峰杭州大錢山從襲禪師雪峰之上足也自雪峰印解洞曉宗要常曰擊關南鼓唱雪峰歌後入浙中謁錢王命居大錢山闡法福州永泰和尚嗣雪峰池州和龍壽昌院守訥妙空禪師福州林氏子嗣雪峰建州夢筆和尚嗣雪峰福州極樂元儼禪師嗣雪峰福州芙蓉山如體禪師嗣雪峰洛京憩鶴山和尚嗣雪峰潭州大溈山棲禪師嗣雪峰吉州潮山延宗禪師嗣雪峰益州普通山普明禪師嗣雪峰隨州雙泉山梁家菴永禪師嗣雪峰漳州保福院超悟禪師嗣雪峰太原孚上座初至雪峰廨院憩錫因分柑子與僧長慶問甚麼處將來孚曰嶺外將來曰遠涉不易擔負孚曰柑子柑子次日上山雪峰聞乃集衆孚到法堂上顧視雪峰便下看知事明日𨚫上禮拜曰某甲昨日觸忤和尚峰曰知是般事便休峰一日見孚乃指日示之孚搖手而出峰曰汝不肻我那孚曰和尚搖頭某甲擺尾甚麼處是不肻峰曰到處也須諱𨚫一日衆僧晚參峰在中庭臥孚曰五州管內祇有這老和尚較些子峰便起去峰嘗問孚見臨濟説有三句是否孚曰是曰作麼生是第一句孚舉目視之峰曰此猶是第二句如何是第一句孚叉手而退自此雪峰深器之室中解印師資道契更不他遊而掌浴焉南嶽般若惟徑寶聞禪師福州人師雪峰而友玄沙深入玄奧嘗請寶林傳四卷紀貞元之後宗門繼踵之源流者又別著南嶽高僧傳行于世論曰真覺大師大闡宗風為八閩傳法之祖法席之盛卓冠天下四方緇衲從者一千五百衆而傳燈所載入室法嗣惟五十有五人亦各成佛作祖與師問答𧾱毬喝棒悟證之語咸録弗遺至于他山開堂別有機警不關雪峰話下者但列其名而已若夫燈燈相續鉢鉢相承降是以還我則不暇雪峰別支雪峰欽山主上堂昨日一今日二不用思量快須瞥地不瞥地蹉過半生沒巴鼻咄後嗣雲門妙勝臻禪師雪峰思慧禪師上堂大道祇在目前要且目前難覩欲識大道真體今朝三月十五不勞久立又曰一切法無差雲門胡餅趙州茶黃鶴樓中吹玉笛江城五月落梅花慚愧太原孚上座五更聞鼓角天曉弄琵琶喝一喝又曰南詢諸友踏破草鞋絶學無為坐消日月凡情易脫聖解難忘但有纖毫皆成滲漏可中為道似地擎山應物現形如驢井總無計較途轍已成若論相應轉沒交涉勉諸仁者莫錯用心各自歸堂更求何事後嗣雲門法堂本禪師雪峰演禪師上堂遣迷求悟不知迷是悟之鉗鎚愛聖憎凡不知凡是聖之爐鞴祗如聖凡雙泯迷悟俱忘一句作麼生道半夜彩霞籠玉象天明峰頂五雲遮後嗣雲門元豐滿禪師雪峰道圓禪師依積翠日宴坐下板時二僧論野狐話一云不昧因果也未脫得野狐身一云不落因果又何曾墮野狐來師聞之悚然因詣積翠菴渡澗猛省述偈曰不落不昧僧俗本無忌諱丈夫氣宇如王爭受囊藏被蓋一條楖栗任縱橫野狐跳入金毛隊翠見為助喜後嗣臨濟黃龍南禪師雪峰慧空禪師上堂俊快底點著便行癡鈍底推挽不動便行則人人歡喜不動則箇箇生嫌山僧而今轉此癡鈍為俊快去也彈指一下曰從前推挽不出而今出從前有院不住而今住從前嫌佛不做而今做從前嫌法不説而今説出不出住不住即且置敢問諸人做底是甚麼佛空王佛耶然燈佛耶釋迦佛耶彌勒佛耶説底又是甚麼法根本法耶無生法耶世間法耶出世間法耶衆中莫有道得底麼若道得山僧出世事畢如或未然逢人不得錯舉喝一喝下座後嗣臨濟潭清禪師雪峰忠禪師上堂終日忙忙那事無妨作麼生是那事良久曰心不負人面無慚色後嗣臨濟雪峰需禪師吉州禾山殷禪師福州吳氏子也七齡雪峰存禪師見而愛其純篤化其親令出家年二十乃剃落受具辭遊方至九峰虔公問汝遠來何所見當遊何路出生死對曰重昏廓闢盲者自盲虔笑以手揮之曰佛法不如是殷不懌請曰豈無方便曰汝問我殷理前語問之曰奴見婢殷勤殷於是依止十餘年虔移居石門亦從之及虔歿去遊廬陵至永新見東南山奇勝乃承水而往有故寺址蓋文德中異僧達奚道場遂定居學者雲集唐後主聞其名詔至金陵問佛法大意久之有旨延居揚州祥光寺懇辭歸西山詔住翠巖又住上藍寺賜號澄源禪師建隆元年庚申三月示疾三月三日令侍者開方丈集大衆曰後來學者未識禾山即令識取泊然而化閲世七十坐夏五十諡法性禪師塔曰妙相論曰雪峰闡教開宗為六祖嫡派佛法大盛于東南而當時參學如雲一悟玄機瓢笠遠徙雖嗣法別支夫非法門之龍象乎佛日長輝宗風不泯其在斯矣東土祖師系圖譜初祖達磨二祖慧可三祖僧璨四祖道信五祖弘忍六祖慧能青原行思石頭希遷天皇道悟龍潭崇信德山宣鑒雪峰義存雲門文偃分派玄沙師備羅漢桂琛法眼文益分派清溪洪進天平從漪圓通緣德清涼休復奉先慧同寶慶道昌龍濟紹修河東廣原南臺守安鷲嶺善美天龍秀延慶傳殷南臺誠螺峰沖奧睡龍和尚雪峰光緒大章契如永興祿安國慧球仙宗契符仙宗洞明國清師靜福清行欽天龍重機高麗合光國泰瑫齊雲寶勝白龍道希廣平玄旨白龍清慕靈峰志恩東禪玄亮報劬玄應報劬仁義雲蓋歸本林泉和尚洞巖可休法海行周永泰和尚安國弘瑫白鹿師貴羅山義聰安國從貴怡山藏用永隆彥端林陽志端興聖蒲仙宗明安國祥和龍守訥夢筆和尚極樂元儼芙蓉如體保福從展保福可儔隆壽無逸隆壽法騫招慶省僜白水如新招慶法因報恩宗顯龍光澄忋永興可休太平清海慈雲慧深興陽道欽保福清溪報恩熙萬安清運報慈文欽鳳凰從琛永隆瀛清泉守清報恩行崇嶽麓和尚德山德海章江慧亷梁山簡建山澄康山契穩延壽慧輪歸宗道詮九華善詮西明琛龍興裕升山柔枕峰和尚朗州法操鷲嶺和尚睦州敬連谷山句憩鶴和尚溈山棲潮山延宗普通普明孚上座保福超悟南嶽惟徑大普玄通長生皎然化度師郁隆壽紹卿仙宗行瑫龍華靈照瑞巖師進六通志球雲龍歸功臣道間鎮境遇緣報國照白雲乃蓮花從弇十相審超翠巖令參龍册子興佛嶴知默長慶慧稜招慶道匡龍華彥球仁王俊保安連報慈光雲開先紹宗報恩寶資福林澄傾心法瑫水陸洪儼廣嚴咸澤報恩慧朗長慶常慧石佛靜翠峰從欣報恩守真枕峰青換東禪契訥長慶弘辨東禪可隆仙宗守玭永安懷烈閩山室令含新羅龜山