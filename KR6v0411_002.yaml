body:
  text: 郡人徐𤊹纂輯林弘衍參定鄭天綵賴亨侯吳興漢重訂紀創立白馬東來法門不二鹿苑雁堂琉璃開地玉榜金書纍朝敕賜展也大雄千齡弗墜紀創立第二雪峰崇聖禪寺肇自唐僖宗乾符二年賜名應天雪峰禪院昭宗乾寧元年遷於東洋創大雄殿及演法堂建塔勝處王氏傾國資給施夏屋彌山鑄金身像設畢具光化三年改名應天廣福禪院宋太平興國三年賜名雪峰崇聖禪寺逮有明因之永樂九年辛卯鎮守太監馮讓捨財住持潔菴映禪師重創佛殿法堂山門諸處閩中諸大剎雪峰首稱巨麗嘉靖辛亥建寧斗峰寶積禪寺比丘道覺與九十六代住持行存重創天王殿歲久頽壞天啓七年邑人曹學佺捐資重修國朝康熙壬寅改向重構未獲告竣殿前瓦塔二座永樂中三寶太監自西洋擕來置此法堂在佛殿後祖師堂在法堂之右祖師坐化全身藏此唐龍紀元年師預造難提塔四周斫石為卵形當示寂時留讖謂石卵爆盡杉枝拂地奯竹筍生吾當再來檀越祠在法堂左祀檀越藍文卿唐封威武軍節度使明護侯王男藍應潮通祐神君次男僧守遠大悲賢聖護佛正法今廢枯木菴距寺數百步萬工池之前有枯木非梗非柟大可十圍外嵌中枵皮剝殆盡色如黃金大師初入山時宴坐其中今雖無枝梢而本根不朽自唐迄今復八百餘真神物也萬曆己丑住持定綺作菴覆之木裏外俱唐宋遊人刻名成化己亥侯官縣丞吳興劉瓚篆書枯木菴三字鼇山閣初大師與欽山巖頭客澧州同假鼇山邸舍夜坐不𥧌欽山詰之師曰心未穩在乃令吐襟次因謂曰從門入者不是佳珍須從自己胸中流出將來與我蓋天蓋地師廓然大悟後名其閣曰鼇山蓋識成道之由也今廢留香堂寺有三僧堂西堂宋初有一僧敗絮百結瘡毒遍體每剝痂血故穢几席與處者不堪其惡主事遣之獨鄰榻僧憐之而送之門已而行數里其僧曰荷君勤意適留香相浣回可取之言訖冉冉而去及還所坐處異香襲人經時不歇章郇公得象作留香堂記何大圭重修又記之萬曆中住持賢桐重創三毬堂大師設三木毬每欲度衆則輥一毬以示機鋒傳燈録云玄沙見師輥出木毬仍即安故處師便入房今三毬猶存其一白雲堂在寺內臥雲堂在寺內如歸堂在寺內扆翠寮萬曆間僧仁岧建化生臺在寺之南今廢萬松關在萬工池之南關傍有古杉二株一為閩王手植一為大師手植至宋淳熙間師植者直上參天王植者樛而逮地今皆大數圍矣三山志云古杉在蘸月池之旁化成亭在丁山距寺四十里入山之第一境望州亭在寺之南肅儀亭在寺之南半山亭在雙溪寶所亭在藍田水磨坊師於枯木菴設水磨坊驅木偶人轉輸米麥狼籍無鼠雀耗師自題云菴前永日無狼子磨下終年絶雀兒至今猶然龍眠坊在寺之南金鼇橋本山溪澗之水皆由此出釃水處有洞穴深廣莫測與枯木菴接近鐵鎖橋在大穆溪石梁橫亘昔寺僧以鐵鎖束之以固風水藍田莊唐藍文卿所創距寺十里大穆莊唐藍文卿所創距寺六十里太平莊唐藍文卿所創距寺三十里天池莊唐藍文卿所創寺二十里上洋地方東菴今廢西菴今廢南菴今廢雪峰廨院在省城南隅福星坊內有明成化十八年鎮守太監陳道重建今廢海會塔在寺之西唐置明代湮廢天啓七年邑人曹學佺捐資修復見住持賢桐記湯院舊有寺即可遵題詩處定林菴在獅子巖下天啓五年僧如淨建國朝乾隆十六年重修順治六年間玉漈吳姓建樓屋為前照今廢無字碑在寺南古頌云一片如屏紫翠間風吹日炙蘚花斑莫言箇裏無文字要在當人著眼看碑廢趺存枯木菴題刻維唐天祐乙丑歲造菴子及作水池約五千餘功時廉主王大王當院壬午年得朝請郎守殿中丞權知福州軍州事借紫何允昭捨料錢三貫文重修蓋茲菴時大宋雍熙四年丁亥歲十一月五日謹記何知府親躬到此詩云盡日嘆嗟真蹟在池邊看木蘚斕斑枕子一枚雀嘴杖一條原生自菴中三衢吳亮君采建中靖國元年辛巳歲九月十九日遊已上刻在龕內韋子駿至元庚午六月吉壽卿壽成侍行王詔陸侁弟萃偕度儉二釋同遊政和壬辰初秋下旬劉縝同弟縉清臣政和戊戌季秋至此後二年庚子孟夏隨女兄供五百應真偕外甥孫光祖甥之子元壽後來黃光朗繼至信安毛世高與真慧偕來鄭昻尚明宣己宣和己亥也臘月二十日遊真慧謨師偕來許大年同真慧師來辛丑仲冬唐功懋宣和甲辰同遊延安任士安合肥李雍河南范伯奮睢陽蔡宙毗陵邵杰建安鄭璵莆田方升之建陽王康功紹興己未三月草有六日同來季昕紹興辛酉九月侍者同至陳默李綱方金沈濟追遊陳景俊有卿開禧丁卯五月旦觀川德近彥昌中野涉道人紹定四年重來何子祥螺菴肇師偕來淳祐甲辰夏五朔長樂何桓登山齊僧視先君與先少卿舅留名捫泥拂塵而去住山石翁禪師命鋟木以志歲月丙午五月鍾進卿到此戊午再此石亘陳粹癸亥五月望日至此懶散壬戌仲春遊𤊹按劉後村文集有跋陳懶散帖劉宋末人則此壬戌實景定三年也懶散善草書木上所刻亦狂草有法榮祿大夫福建行中書省平章政事集賢院使領會同館事吳國公亦黑迷失捨梯已寶鈔賫擎時延祐元年住山樵隱悟逸題欽差內官古童𫨻奇徐忠三員於永樂八年正月十九日登山喜捨大殿五尊佛藏修崇善事遊覽古蹟登象骨峰觀龍頭水磨香石諸境界至二日出山住持潔菴題崇禎庚午四月八日徐𤊹高景林寵來以上刻在龕外論曰自象教聿興花宮蓮宇金碧焜煌殆非一日崇聖禪林肇從唐季偏安霸主傾國資以庀匠石濬池不惜萬工亦云盛矣經今七百餘年宏麗莊嚴弗㬱往昔而枯木輪囷不生不滅豈非神物有所呵護哉水磨絶夫鼠雀僧堂留厥異香大師遺讖屢有明驗固難以常理測也佛法靈通慈風浩大不於此而益信乎至於地布黃金門開珠網不無望於今之檀越
