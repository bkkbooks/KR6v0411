body:
  text: 郡人徐㶿纂輯林弘衍參定鄭天綵賴亨侯吳興漢重訂紀藝文神瀵濯龍孤峰聳鷲不有雄文遺蹤靡究千百斯年山靈呵佑椽筆繼響有光雲岫紀藝文第八文類雪峰真覺大禪師碑銘唐黃滔字文江莆田人大師法號義存長慶二年壬寅生於泉州南安縣曾氏自王父而下皆友僧親佛清淨謹志大師生而鼻逆薰血乳抱中或聞鐘磬或見僧佛其容必動以是別鍾愛於膝下九歲請出家叶而未即十二從家君遊莆田玉澗寺寺有律僧慶玄持行高潔遽拜之曰我師也遂留為童子焉十七落髮淳朴貞古了與流輩異暨武宗皇帝乙丑有旨沙汰僧徒乃束髮於儒冠菜中而蓬迹來府之芙蓉山弘照大師見而器之爰止其所至宣宗皇帝之復其道也涅而不緇其身也褎然而出北遊吳楚梁宋燕秦受具足戒於幽州寶剎寺訖巡名山扣諸禪宗突兀飄雲翔鳥逝爰及武陵一面德山止於珍重而出其徒數百咸莫之測德山曰斯無偕也吾得之矣咸通九年師歸芙蓉之故山其年大安禪師亦自溈山擁徒至坐於怡山王真君上升之地其徒熟熟師已嗣德山纍纍而關師拒而久之則有行實者始以師同而議之曰師之道巍巍乎法門圍繞之所不可造次其地宜若鷲嶺猴江之為卜府之西二百里有山焉環控四邑峭拔萬仞崷崒以支圓碧培塿以覛羣青怪石古松棲蟄龜鶴靈湫邃壑隱見龍雷山之半頂之上則先冬而雪盛夏而寒其樹皆別埀藤蘿芋茸而以為之衣交錯而不呈其形竒姿異景不可殫狀雖霍童武夷無以加之實閩越之神秀而古仙之未攸居誠有待於我師也祈以偕行去聲秋七月穿雲躡蘚陟險升幽將及之師曰真吾居也其夕山之神果效靈翌日巖谷爽朗煙霞飛動雲菴既立由是抳法輪於無為樹空門於有地行實乃請名其山雪峰以其冬雪夏寒取鷲嶺猴江之義斯則庚寅逮於乙未師以山而道侔山以師而名出天下之釋子不計華夏趨之如赴召乾符觀察使京兆韋公岫中和中司空川陳公巖每渴醍醐而不克就飲交使馳懇師為之入府從人願也其時內官有復命於京語其道其儕之拔俗悟空者請蛻浮華而來剃僖宗皇帝聞之翰林學士訪於閩人陳延郊得其實奏於是聖錫真覺大師之號仍以紫袈裟俾延郊授焉大師受之如不受衣之如不衣居纍夏辛亥歲朔遽然杖履其徒啓而不答雲以隨之東浮於丹丘四明明年故府侍中之有無諸句尅句洗兵於法雨致敬於禪林馥師之道常東望頂手後二年自吳閩大加禮異今閩王誓衆養民之外雅隆其道凡齋僧構剎以之龜焉為之增宇設像鑄鐘以嚴其山優施以充其衆時則迎而館之於府之東西甲第每將儼油幢聆法輪未嘗不移時餘乎一紀勤勤懇懇熊羆之士因之投迹檀那漁獵之逸其或弭心鱗羽戊辰年春三月示疾吾王走醫醫至粒藥以授師曰吾非疾也不可罔子之工卒不之餌其後札偈以遺法子函翰以別王庭夏五月二日鳥獸悲鳴雲木慘悴其夜十有八刻滅度俗壽八十有七僧臘五十有九以其月十五日塔而存焉其塔也其徒僉云以山之竒堂之峻法堂也大師之生也王去聲是其歿也不宜捨諸故坎其中焉若干尺之高若干尺之周皆雕珉石錯火壤磷磷然嶪嶪然四隅則環宇以庥玲瓏䆗窱雲霞時入風雨罔侵其日奔閩之僧尼士庶僅五千人閩王涕之降子左金吾衛將軍檢校刑部尚書延稟始陳祭設齋焉大矣哉大師之見世于是罔量其僧伽自始及茲凡四十年東西南北之夏往秋適者不可勝紀而常不減一千五百徒之環足其趨也馳而愈離辨而愈惑常曰三世諸佛十二分教到此乃徒勞耳其庶幾者若干人其一號師備擁徒于玄沙其二號可休擁徒于越州洞巖其三號智孚擁徒于信州鵝湖其四號慧稜擁徒于泉州招慶其五號神晏今府之鼓山也分燈之道皆膺聖獎錫紫袈裟而玄沙級宗一大師招慶玄晤大師鼓山定慧大師之命焉其曹首曰法雖無説名以文埀自少林之逮曹溪無不刻碑而紀頌我師其默乎一旦𢤂其曹句首曰從智如堵而扣愚求文滔老且病刊勒之加多已辭避欽師之道不覺聳然偉夫恭聞釋波之東注流其象則不流其旨流其旨則不象其形厥初大迦葉之埀二十八葉則至於達磨達磨六葉止于曹溪分宗南北德山則南宗五葉大師嗣句之今六葉焉雪峰之分玄沙洞巖鵝湖招慶鼓山其道皆離貝葉以抵其七非滔之能言也但美數公葳蕤其葉衆多殷勤之請遂為之銘而應其求其詞曰曹溪分派誰繼南宗一言冠絶六葉推雄無物之物非空之空不瑩而明不增而隆縮靡秋毫舒彌鴻濛不有靈景曷揚真風懿彼閩越巍乎一峰洞壑斯異雪霜罕同天之有待師也云鍾名將道協迹與山崇奔走厥徒百千其叢庶幾幾人莫不玄通分燈照耀徹本玲瓏聖君寵疊賢王敬重不生不滅曷始曷終刻貞石於斯文旌厥德於梵宮開平二年歲在戊辰夏五月裏行御史充威武軍節度推官前四門博士黃滔撰難提塔銘併序唐真覺大師夫從緣有者始終而成壞非從緣得者歷劫而常堅堅之則在壞之則捐雖然離散未至何妨預置者哉所以疊石結室剪木合函般土積石為龕諸事已備頭南腳北橫山而臥惟願至時同道者莫違我意知心者不易我志深囑載囑幸勉勵焉縱饒他日邪造顯揚豈如當今正眼密弘善思之審思之銘曰兄弟𣸸十字同心著一儀土主曰松山卵塔號難提更有胡家曲汝等切須知我唱泥牛吼汝和木馬嘶但看五六月氷片滿長街薪盡火滅後密室爛如泥天復三年威武軍節度管內觀察處置兼三司發運使光祿大夫檢校司空平章事開國公食邑三千戶王審知刻石雪峰清規夫出家者先效軌儀肅嚴其行行既精矣乃曰其人方可參選明師決擇其理且正道寂寥盡古今而絶逢包通十方萬類而從來莫二如此之事假世而言之若以住持之門依像法而安處收物情而共居欲令百川同歸一源衆流而臻大海古云家無二主國無二王二主必諍二王則競况僧居無諍有諍非居要令三世住持萬所心安人和不失其緒者矣或有投歸僧坊而求變白披緇者盡令歸奉一主主無二即免為諍但依芙蓉先師規制即知其義也藍田張際兩莊但逐年輪差了事僧勾當始終共應塔院常住供養當院僧徒等切不得別議住持衆中或有老者病者不任自取索即差了事童行終始看侍如無童行輪差沙彌如無沙彌輪差大僧終始看侍無至違越或有鄉村檀那精心禮請唱佛道場必須衆議能為法事者差免俗譏嫌當院出家沙彌童行大僧等無事出院不辭知事及大衆等如若𨚫來便須出院若為小小因緣若無重過𨚫來即罰禮一百拜放住如若當時不遵指約亦須出院當院徒衆非知事輒行杖木令人不安晝時出院右件條約住持之事仰綱維主首及僧徒等共相遵守不得違越終而復始光化四年閏六月十日沙門義存告示雪峰遺戒報諸人等夫泡幻緣生去來不定吾僅四十年來未嘗不苦口相勸近日佛法淡薄惟於世諦殷勤至於信施檀那師僧和尚百年終歿無善報恩世禮既不相應亦合有少分省察吾若四大離散日先已有木函石龕並依舊志安排不得別造墳塔不得設靈筵不得持孝服或有帶一尺布下一滴淚此非沙門非我眷屬况更哭蒼天但為俗態頗辱宗門或有不遵依法擯逐當院年長有從智仰共相遵授不得妄有乖張他後住持並依芙蓉先師規制况從前不曾親度尼弟子吾脫去後切不得放入院門免世譏嫌為恆式者兼上院已後切不得別議住持開平二年戊辰四月二十八日沙門義存告示先師住持規制奉宣下降帖命準無條件施行不許各度童行私置田業擅泥鍋仍別衆食寄附常住莊舍典質營轉等事準此禁斷者時乾德三年歲次乙丑五月十二日天下兵馬大元帥守尚書令吳越國王俶建捨田宅為梵宇遺囑唐藍文卿唐懿宗咸通十一年庚寅三月十一日真覺具狀報相見文卿相見畢問何處僧真覺啓覆云某係泉州人氏俗姓曾剃髮於莆田玉澗寺出家得度遇會昌沙汰復到本州芙蓉山禮宏照訓禪師祝髮遂往幽州受戒參學授法於德山鑒禪師但某特來求一菴基藍文卿遂指門首池畔有大株枯樹下卓菴與師居之次年三月一日文卿與男應潮女壻陳伴同遊柳洋莊望其林木秀茂遂與里人謝俲方訓等商議此處宜建寶剎係圓峰涼映臺之北迎師居之由是四方雲衲奔湊初有一十三人見其屋宇窄狹難安廣衆文卿與妻楊大娘商議汝可領小男應辰往茆洋井黃坪莊居住我與大男應潮將所居屋宇亭榻三百餘間米倉十二間莊田二十所水牛三百六十頭諸莊田地土林界各有契書分明其田總計二千五百八十石五斗有零種收米一萬一百石有零又稅錢二十四貫有零文卿與男應潮女壻陳伴僧男守遠請忠懿王就此建大梵剎師伯行實明地理破天荒立山門放水路原始要終其功不淺將古尼寺移居雲峰男批歷為記向後子孫收受遺囑我去世如見山門主首僧行宜相加敬不可干擾忌辰日不請入院燒香但經我遺囑文赴官照撥入山林斫牛草柴木不得干欄咸通十二年辛卯歲十月又遣男應潮再捨田莊經官判據開給福州侯官縣永靖鄉加祥里藍應潮弟應辰共將本業淨盡入雪峰常住咸通十三年壬辰歲斬草擇地為藍田境造莊屋開耕為田受種二百六十石官米八十石親書此照乾符二年乙未歲三月十四日忠懿王具奏僖宗皇帝降賜敕號真覺大師仍封檀越主藍文卿威武軍節度使明護侯王男應潮通祐神君僧弟大悲賢聖護佛正法當年六月初十日降院額乾符三年十一月十一日藍大王薨合寺徒衆塑王像為土主安奉供養揚大娘同年四月歸壽葬於太平莊後地名下田莊前嘉隴雪峰了禪師真贊宋李綱邵武人丞相粹然而深如玉在山而珠在淵頎然而長如野鶴之處雞羣謂是為了四大假合何者是真謂是非了五峰秀出望之儼然道與之貌丹青所傳其有不得而傳者耶皓月普分千水影清光常滿一輪中樵隱塔銘元悟逸浮屠之創古有所制然幻泡匪堅古今一夢凡有生者不能免焉興斯舉不得已勉從徒弟之請非吾本志就於先師佛海窣堵之傍面巽背乾穴土甃石益以𥺝液融以青脂預為千秋安禪之室備矣成於延祐四年歲次丁巳良月十有八日故係以銘曰幻從緣偶緣從幻空非緣非幻何初何終難提預構名不以崇壽山始造錢不較工佛以心印智以願隆樵木曉霽枯木春融隱顯一致名邈無從花敷雪窟燈聯夜宮天荒地老扶桑日東雪峰住持當山佛智樵隱悟逸述併書雪峰崇聖禪寺碑文記明胡濙永樂十七年冬豫奉使閩粵登覽雪峰之勝適值住持遠芷號秋崖開甃新徑轉偏隘為弘深由萬工池以達山門浚池建橋撤舊更新規模壯觀經始之時豫適至寺衆僧歡躍以改作吉祥之應豫亦喜其山林清蔓因留信宿芷公乃從容謂曰茲山來自武夷延袤聯絡歷數百里以至於此乃巍然高聳峭拔層空蓋閩地多燠冬穻霜雪惟茲山勢接剛風氣候侔於中土冬常積雪故名雪峰唐真覺祖師駐錫於此創建梵宮歷年既久屢興屢廢今聖天子興崇佛教凡名山古迹皆葺而新之僧録以雪峰名剎非戒行老成者不足以當興復之任乃於永樂二年詢謀僉請以前欽選住泉州大開元寺潔菴映禪師來主斯席師姓洪氏名正映號潔菴世居江右之金溪自幼托迹沙門不茹葷羶受具足戒於杭之昭慶寺得法於靈谷巽中禪師遠芷亦江右臨川人因得隨侍嗣法分葺玄沙而登山之日殿堂門廡俱為瓦礫荊蓁師即慨然感嘆奮志興復誓不下山寒暑一衲脅不沾席是故八閩崇敬四衆皈依積糧于廩伐木于山陶瓦甓而儲器用越五年佛殿成又明年法堂三門同日創建弘碩雄偉視舊有加肖像端嚴金碧輝煥於以上祝聖壽下祈民福功德之大不可思議一旦師諭遠芷曰汝興復玄沙功業已竟茲山創置大體固具然廊廡僧堂尚未周完豫年已衰邁欲歸老靈谷非汝不足以繼吾志遂移檄僧録於永樂十六年以遠芷升代師任夙夜惟謹猶不敢忘其付囑凡所未備者悉為成之復按茲寺創始於真覺其示寂之際預留讖云石塔卵爆杉枝拂地奯竹筍生五百年後吾當再來至潔菴登山適五百二年諸讖俱驗如合符節况師顏貌又與真覺無異故人咸以師為再來之真覺也此固不可以無記願賜一言勒諸貞珉用垂不朽豫惟佛氏之興肇迹已遠其教以持戒守律為初地以明心見性為實際學其學者勞形苦志困悴山林宴坐默存求底於常樂常住不生不滅之域又何與於寺之輪奐焉然像教之設大衆瞻仰人心之感先乎目之所見觀殿宇之巍峩像設之嚴肅則敬心悚焉而生敬心生則萬善由是而積自漢以來教日益滋寺日益盛至於唐宋間有推沮排抑欲廢其教者誠以盈虛消息皆係乎數有形則有數惟法無形固不囿乎數佛與僧寺皆有形者豈免於數乎姑以此寺言之自真覺至於正映才五百餘年興廢不知其幾至是果應讖而大興者豈非真覺能知乎數而預為張本乎自小世界至三千大千世界乃至無量無數微塵剎土皆始於成而終於空終則復始展轉循環無有窮已一切有為之法亦復如是而有無始成無住無壞無空者存試觀乎寺今既成矣而汝又住其中矣其壞其空寧保於後日乎雖然誠能盡汝今日成住之責必堅必確使無速朽吾為汝記俾汝後之法嗣厥子若孫因吾之言思紹汝志繼而葺之使不致于屢壞屢空是亦汝與汝師常住乎中也芷曰唯唯遂書以為記資善大夫行在禮部尚書毗陵胡濙撰文奉政大夫翰林院學士兼左春坊大學士盧陵胡廣篆額賜進士徵仕郎行在刑科給事中三山姚銑書丹宣德八年歲在癸丑二月前住當山遠芷同當代住持良琛立石送無念師住持雪峰序明鄭亮閩縣人戶部主事佛以虛寂為宗然必有律定之而後以戒則嚴僧以無礙為尚然必有師束之而後以念則齊是故佛去中國二萬里如此其遠也道傳之千載如此其邈也天下僧徒如此其衆也遠則傳微久則離真衆則莫檢也不有賢師持典其教詎不至於訾傲隳弛者哉莆陽無念師者法行峻整儀範莊肅始事如溪如海剪髦髮誦習內典以明大義繼事秋崖講求妙道沿遡真原以達祕旨於是其同儕宗雲請蒞事雪峰有僧志英者來徵言夫雪峰為天下名剎其始事造基創業垂於今豈一朝一夕之積哉披山伐木崇搆殿宇而佛貌以尊闢土墾園儲蓄衣食而僧徒以集必其道德高潔而受律者廣也必其闡教明白而受業者衆也無念繼之將必席其光塵者耶然吾聞禪家尚虛寂教道以軌度二者相戾正道遂隱吾將合焉誦其書求其志黜異以蹈中合離而為同整齊而嚴一則事無非實空洞而不礙則事無非空用律以自守講道以會衆由是則通達昭融尚有光乎始師矣豈不可嘉也哉若夫懸巖翠壁清風寒峭始慕貞名而就焉終以寥寂而厭焉則非吾所知也豫重志英之請姑以是而復之宣德甲寅戶部主事三山鄭亮撰贈鳳岡上人住持雪峰序謝杰長樂人刑部尚書雪峰住持鳳岡上人少希清淨屏塵氛身世業緣視為苦海筏渡迷津能定能慧邑侯顯初周公雅知上人戒律精嚴檄知寺事聿紹華峰綺公正傳儻取謂一了百了領瞿曇大教以齊乎一切衆生非耶抑又有進焉者禪家本來無物萬緣頓息若從此以還火不燃相不著獨印獨證明心見性登極樂世界證無上菩提即心即佛矣余與上人同里閈稔知家世喬木乞言于豫義不可辭謹揚言以頌庶幾柳州嘉文暢昌黎進大顛之義萬歷癸巳仲冬穀旦書重修雪峰寺疏葉向高福清人太師自達磨西來六傳而曹溪又自曹溪六傳而雪峰蓋曹溪之正脈若吾儒之有朱徽國誦其書傾想其淨業者孰忍墜其遺迹而吾郡之古剎不知凡幾今且什七頽廢住持緇流僧其首屠酤其口知有田耳烏知有寺萬歷壬寅歲余探名勝至雪峰將及寺道傍枯木外嵌內讀唐宋題刻恍若真覺大師撒手歸處入寺禮難提塔石卵無數爆猶未盡為之恍然何處尋言逐句於是諸僧迎勞威儀整肅即未必能滾木毬大闡宗風而誦經守戒亦無負真覺龍象余心善之因留宿纍日賦詩為贈迄今草有五年舊僧賢桐等來謁告以寺久漏𦉑不修且朽求余片言慫慂布施余謂莊嚴載金經有植福之思者亡庸余言庸余言者則以世情不住相是以余強之也余何言哉雖然莊嚴佛土佛有是言矣又謂布施七寶及於身命不如誦偈四句非布施無與於福德也蓋以布施者未必緣誦此偈誦此偈者未有不布施藍長者非知世界如夢幻泡影安肯盡施纍巨萬之田宅赤身而去哉然而歷八百餘年子孫之聚族古田派衍於繩繩纚纚與雪峰相終始其所得福德何如纍巨萬之田宅哉余之言如斯而已諸上座其以余言臚傳十方天啓丙寅春日中極殿大學士少師上柱國吏部尚書豫告福唐葉向高撰重修雪峰寺募緣疏曹學佺侯官人四川按察使余性故喜遊海內名山多所經歷獨有雪峰去余里中數舍耳顧乃而遺之相國葉公曩戲謂余是可傲之以其所不知者余里居十年數動遊興為期輒不果即夢𥧌中亦往往有披榛撥雲半途而廢之境不解何故或者余宿因在真覺大師會下投參不合羞沮而退耶抑機緣有待不欲使其無事而浪遊耶頃以量補粵西分當出門一出門即當抵山下而寺僧五六輩自洪江尾而來者其敦請又甚勤也豫於往否之意本所未決適值霖雨載途不能上岸則此遊更錯過不知又何時矣寺僧之亟余遊也謂余一遊之後斯故者可新頺者可復而頗以為梵剎重也顧雪峰山曰名山剎曰名剎實非以余遊故重而豫之脈脈自審于胸中其為故也孰溫之廢也孰振之重有負于性靈矣負性靈則負山靈不言而可知矣茲豈無根器猛利一施鉗錘當下大悟者耶又豈無財施法施兩得解脫為首度波羅密者乎聊書此而復山僧以待夫宿根大力之承當于斯者余歸而續登山之緣未晚也繕修雪峰寺募緣疏陳一元侯官人應天府丞夫德山正脈代著雪峰彼𡶨真修道由佛土古雪峰今雪峰有何分別內佛土外佛土悉欲莊嚴覺大師衍慧津於西域普注八閩藍長者開福界於東洋今將千載木毬不滾此時之東堂西席象醉龍蓮漏已終昔日之下宇上甇雀穿鼠齧觚稜懸霤八平身上霰霖㼧瓦容光諸佛手中擎日月鼉鳴獅子座塌在回眸蝎蝕雁形堂危如纍卵於是山僧紹城預知大厦騫崩徒然恐怖自信庸材朴遫何以支持存公説法之筵空有恆飢野衲藍氏飯僧之産盡歸久佃豪農僧舍蕭條欲一椽而莫措佛廬雕敝難獨力以輕謀余謂流轉法輪足渡四生於苦海恢張象教可生一衆之信根𣒰檀相辱在泥塗豈容坐視薝蔔林經營土木必待他來佛説補理故坊是謂二梵之福我聞致恭瓃畫不虛六度之因請看過去藍田永受螽斯福報敢告再來須達共圖象骨良緣重修海會塔記賢桐海會塔舊在雪峰寺之西真覺大師所創時僧衆亡過者三千餘人俱茶毗歸骨于塔纍代因之至嘉靖初始有別營墳域而海會斯廢石基崩壞蔓草叢生百年於茲矣天啓七年宰官曹公隨喜至寺捐資布施百廢具舉因詰海會所在僧徒披蓁劈莽始履其處曹公命工修復其壙皆石砌濶丈有二尺長丈有五尺深丈有一尺隔而為三前壙葬住持中壙葬衆僧後壙葬行者而舊骨可三百餘擔半蝕土壤乃發出以火重煅之總歸于行者之壙焉虛其二以待後人曹公斯舉誠千秋至計矣春秋祭掃屬之當年常住不敢有廢是歲仲冬沙門賢桐謹撰遊雪峰記徐㶿閩縣人自大穆溪舍舟而沿溪行溪在左里許有鐵鎖橋疏水六道渡橋溪在右人行山腰溪聲咽其下逶迤二十里山漸峻溪勢漸高兩山夾澗瀑奔流如匹練如轟雷一瀑滙一潭瀑白而潭碧如是者五名五疊泉此入山之第一觀也過此則為丁山山形作丁字雞犬籬落殊幽又十里曰大坪即古之太平庒蓋自溪口來蜿蜒皆嶺至此始平曠故名日向午過馬氏山居少憩主人肅客甚殷止宿小樓晨起行二里許路左危石崚嶒草木蒙葺其上曰羅漢巖又五里曰小坪即古藍田莊初祖師建寺四方雲衲廣衆藍長者文卿捨莊田二十所歲收米一萬餘石盡入常住至今名存又五里曰雙溪自雙溪登山皆名雪峰衆山環轉高入雲表溪聲寂然矣又十里抵枯木菴即義存祖師始入山趺坐處輪囷糾結大可十圍而空其中色如黃金木裏外刻唐天祐宋雍熙元祐紹興開禧及元至正遊人姓名祖師塑像坐腹中宛有生氣作菴覆之出菴夾道古杉數十株皆祖師手植名萬松關關前為萬工池蔓草湮塞再折為寺閩王布金地已燬永樂中僧潔菴重興佛殿法堂故宏壯今頗頽廢中堂祀閩王為檀越左祀藍氏父子為伽藍右則祖師塔奠焉塔鏤石卵數百祖師讖云卵爆盡寺當重興至潔菴時讖符咸謂祖師後身理或然也寺樓藏木毬一傳是當代遺物殊未可知又有無字碑及唐黃滔撰真覺大師碑銘皆不存寺前後有池曰蘸月石曰磨香嶺曰梯雲亭曰望州泉曰卓錫橋曰金鼇臺曰文殊曰古鏡路曰雪嶠半委荊榛惟應潮泉在象骨峰之巔水才數寸進退盈縮與潮候無差實為海眼云相傳祖師建寺凡所需木石以錫杖扣之即數百里皆從池中浮出又謂祖師自題水磨雀作人言至今山中無鼠雀耗又山上有石竇能出米人喜談之似未足信也由山腳至巔高可四十餘里根蟠四邑未冬即雪余遊時值陽月十日天寒風微霰將集所攜衣袂著體不給是夜宿扆翠寮老僧仁岧雅能詩曾識先君於三十年前豫尚稚齒一見歡然道故次日各題所為詩於壁別僧歸仍宿馬氏樓遲明下山兒陸舟次白沙不能從歸問雪峰遊何狀遂口記以授之且質同遊謝在杭水部并吳元化時萬歷辛亥歲也遊雪峰記謝肇浙長樂人廣西布政使十月七日余出洪江買舟有事於圓峰閣翌日禮成乃歸舟放流二十里至大穆溪肩輿登山十里至化城亭杉栝刺天重岡合沓而溪流琮琤奔瀉徑逐溪轉石梁木彴或東或西四望山田從椒及趾截如梯級巨石礧砢錯落畛隰間恨不令夸娥氏移而擲之天外也二十里過丁山地益高溪流彌駛遙見峰頭瀑落如雪耳畔轟轟作雷霆聲就視之可百丈許最上如懸絙如匹練稍下如半壁天又下四散如玉龍數十道又下復合為一凡五疊各異勢而皆有潭承之淜湃奔赴飛騰翻舞之奇不可名狀彼九鯉之雷轟漈匡山之康王谷皆浪得名耳余指示諸客此是雪峰道中第一奇絶惜其僻處幽谷輪蹄罕至故湮沒而不稱良可嘆也又十里為太平莊僦食於馬氏主人刲羊網鮮供張甚設盤桓久之夕陽已在山矣遂宿客樓上客各賦詩贈焉旦起別去過獨木橋危甚衆皆褰裳涉自此道稍夷二里許過羅漢巖十里至雙溪又再度嶺為藍田莊為寶所亭不復聞溪聲矣山路既窮恍在雲際遠近羣峰皆羅立環侍遙望叢林隱隱扆翠靄而俯平田蓋自郡城至此步步就高不知其幾千萬仞也道傍小臺峨然為枯木菴木紋膩而中空闢門焉根猶植地昔唐義存僧入定於此經今七百年矣而質理如故非神物哉龕內有唐天祐乙丑造菴題刻所謂亷主王大王者皆審知也雍熙四年知郡事何允昭刻而題稱太宗廟號當為後人補書無疑龕外則有元祐韋子鑒紹興任士安開禧陳景俊及鄭昂諸題名出菴為萬松關松旁積水荒陂茨菰葉爛則放生池也不百武至寺寶殿法堂亦極弘敞而頗頽落斷鐘覆地井幕凝苔僧衆亦寥寥不復振獨東廡小寮差為明淨客解衣小憩遂至後殿拜伽藍像云即藍文卿長者也長者當時所施田宅莊牛以億萬計遂闢此勝地迄今寺受檀越之賜而長者亦享香燈之奉使當時私為子孫有不數傳而為他人物矣始知周顒許詢之輩以捨佛而得不朽之名非別具一大見解者不能也中有閩王審知像殘經敗簏堆委壁間説法高臺朽折不可復登矣又西為義存所葬石塔四周斫作卵形當師示寂之時留讖謂石卵爆盡吾道復興今爆十之九矣及詢所謂金鼇橋一洞山古鏡臺無字碑者皆不可復識即木毬相傳亦非故物獨應潮泉在山絶頂一壑泓澄隨潮溢涸蓋寺中靈迹惟枯木與是耳夜與老僧挑燈談興廢往事僧言五十年前寺猶殷富無恙近為當事者括寺田以充軍餉橐橐之資十僅得二焉兵已撤矣而餉不聞減也種寺田者皆環山大駔居污邪為奇貨歷歲逋負官課私租無所倚辦稍誰何之輒羣嘯挺白棓相向縣官不知也按籍而箠楚者僧耳嗟乎嗟乎寶地腴田相傳千載今既不能捨而益之亦已矣而無藝之征朘削於上不逞之豪乾沒於下蠶食隱忍日復一日寺安得不寥落而僧安得不鳥雀散也葉相國壁間題所謂辛苦催租吏豪門半寺田不亦有激哉其言之乎夜分始各就枕晨興僧衆競出箋麻索書遂題詩後壁上日近午乃別僧下山山氣霏微如欲雨松風瑟瑟吹人骨冷至葦林中聞虎聲甚厲輿者股辨幾不能前晡復至馬氏宿焉翊日至大穆溪登舟又翊日始入城是萬歷辛亥之陽月十有三日也遊雪峰記鄭天綵歲在甲戌仲秋之望文石賴孝卿過余山樓適風雨驟至連牀夜話繼謂雪峰勝槩不違咫尺苟弗遊目騁懷其山川如有待何晨興雨霽偕行十里許抵玉漈主人吳武卿留宿于燕居亦欣然同往躋攀至柳洋見一峰峭拔雄秀勢從北來相與延望久之俄有杖叟遇諸途曰此所謂象骨峰也應潮泉在其巔獅子巖在其南是為寺之屏扆復指岡上磐石云此涼映臺也傍茲逶迤下層徑是為梯雲嶺余樂聞其言又行里許飛鳥𠹳𠹳在衣裾下視衆峰環抱一壑其狀雅肖蓮花知寺在其間矣少焉既至梵宇巍然蒼靄中雖草創重搆綽有可觀山僧肅客煙霞儼上眉尖祗樹遺風猶有存焉維時桂香滿谷氣朗天高檻外積水湛然碧無纖繄者萬工池也跨澗而行上有繁隂蔽日下有鳴泉潄玉者金鼇橋也若枯木菴以及亭臺諸勝或遐或邇或廢或存躬探其幽蹤熟間其舊址爽氣山光清人耳目輒覺身遊太虛不復作塵間想矣是夜僦宿雲房月色如晝仙梵既停挑燈讀山志且云銅鐘不知何年罅裂從口直上約有六尺許今復自合靡露痕迹鯨音振動林木鏜鎝如故無少剨損余謂名山勝地隆替循環其再興之先兆乎其山志宜為重訂翻梓以俟來者同人皆然諾余亦協襄其事同人者誰孝卿武卿也詰朝言旋草草筆此以記一時之逸興云遊雪峰序賴亨侯雪峰之遊招携也顧步雖同領略或異人各述其襟懷言必歸于風雅珠聯七字詎殊秋雁排空筆揮五彩奚遜朝虹吐氣美矣哉盤盤山勢喻如出水蓮花鬱鬱柳枝亞彼凌霄祗樹片石窺色相當年何止千僧皓月照禪心此日僅餘數衲花宮梵響任隨飄渺松風丈室燈明好邀清虛鶴夢微矣夫知機處方寸含百種之靈香解悟時半偈垂九天之甘雨所以地布黃金後先一揆人開青眼彼此三生玉帶旋留慕東坡于夙昔浮圖繼造來玄度以何年分得半牀雲豈可徒過竹院辭將五斗米輸他托意桃源今則高尚臥雲每傾懷乎支遠從容入社敢追武于宗雷惟是好古搜奇屢窮山海之經考德觀光恆問巖泉之志秋容淡淡寓詩情于溪楓籬菊夕籟沉沉玩物性於野鳥寒蟬神既怡矣毋庸來蓬瀛于枕上心既曠矣奚啻縮天地于壺中故開士卜居胸間別有丘壑而高賢得趣觸目皆是𦘚圖遊雪峰説吳興漢嘗考周昭王二十六年甲寅覺皇氏誕于西乾竺國漢明帝夢金人聲教始及東華六朝以後珠幢琳宇彌遍寰中雪峰之興則肇於有唐維時禪風遠被龍象之盛冠于海內論者皆謂地靈所鍾非偶然也然道場法運一弛一張喻如四序循環雖宇宙之大亦所不免苐有鎡基可以待時緣會則興未可量也今者式微猶幸燈傳未泯蘭宮隱現雲生戶外之峰茶井甘寒泉湧階前之地撫景興懷留連再四因思白香山之繡佛持齋王荊公之捨宅為寺豈非儒者至於歷朝名賢皈心為外護指不勝屈蓋能勘破世相匪堅深知福田難遇如藍長者盡捨纍巨萬之田宅其子孫衍泒于古田從不以檀德自矜而聲華彌著源遠流長良有以也按史鑑昭王之世垂今二千七百餘年天竺距東華計十萬餘程釋氏教法沿流弗息其間必有不可滅者存豈膚淺之人能悉其旨哉唐太宗嘗序其教為聖教梓潼隂隲文亦勸人廣行三教聖神之言應不謬也茲者重梓山志其意尤兾挽頺波復淳源長瞻慧日于象骨山頭謹書數言如左論曰豫以神皇之三十九載偕同志為是山之遊探討不倦越草年歲在庚午復履斯地而求其先代遺文石碣寥寥殆不可覔大師塔銘乃録諸黃御史集中真若龜鬚兔角耳夷考淳熙三山志留香堂舊有章郇公得象記而何大圭重修又記之今皆弗存是知陵谷匪常文字隨之澌滅矣邇者寺僧弘振修海會塔始披蓁莽得悟逸刊碑然則所遺者不既多乎蓋南荒地軸形勢最雄開山禪宗蹤迹頗遠惟是登陟之杖履百無一焉誰操不律用答山靈哉好奇之士布襪青鞋請從此始
