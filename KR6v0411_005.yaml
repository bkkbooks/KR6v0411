body:
  text: 郡人徐㶿纂輯林弘衍參定鄭天綵賴亨侯吳興漢重訂紀當山祇園聿開緇流常住金錫長栖水田僑寓花窟蓮宮息心衛護世代纍遷道場鞏固紀當山第五第一代開山真覺大師諱義存當山三十九載壽八十七詳見年譜第二代戒華禪師福州長樂林氏子宋慶曆四年當山皇祐五年遷化塔于鹿溪第三代元旵禪師閩縣張氏子慶曆六年當山熙寧九年遷化塔于聖泉第四代仁曉禪師懷安柯氏子皇祐元年當山曾注維摩詰經嘉祐元年示寂第五代象敦禪師福州城北劉氏子皇祐五年當山塔于本山方丈東北第六代德建禪師懷安潘氏子治平元年當山後移住地藏寺遷化塔于地藏第七代彰微禪師古田蘇氏子治平四年當山僅九閲月徙秀峰寺遷化塔于秀峰第八代行元禪師長樂徐氏子治平四年當山退隱東菴第九代延超禪師懷安陳氏子熙寧六年當山徙安國寺第十代嘉潤禪師閩縣楊氏子熙寧八年當山徙聖泉寺第十一代印超禪師熙寧九年當山紹聖二年示寂壽八十一臘四十九塔于本寺東北第十二代月譽禪師紹聖二年當山壽八十四金骨入海會塔第十三代隆禪師閩縣曹氏子崇寧二年當山政和二年示寂壽四十五塔于本寺石刻中興慧照之塔第十四代有需禪師莆田洪氏子政和二年當山宣和二年示寂壽七十一塔于山巔第十五代大智禪師浙江鄞縣人宣和三年當山建炎四年示寂壽六十一塔于本寺西菴第十六代真歇清了禪師西蜀綿州雍氏子年十八試法華經得度住成都大智寺習經論出蜀至沔見丹霞淳禪師悟旨後抵長蘆謁照禪師一語契投傳授衣拂照師示偈曰得法丹霞老傳衣祖照庭思深轉無語懷抱自分明尋遷四明之普陀台之天府建炎四年入閩當山四載退居東菴後奉旨遷江心寺示寂于開山新寺全身塔于西華塢諡曰悟空禪師李忠定綱為作真贊第十七代預禪師紹興四年當山凡七載示寂塔于古寺法堂之東第十八代惠禪師紹興十年當山凡十五年示寂塔于東菴之西第十九代宗演禪師紹興十五年當山次年示寂壽七十三臘五十一第二十代繼椿禪師楚湘潭張氏子紹興十六年奉旨當山三十三年示寂塔于大池莊後第二十一代空禪師紹興二十三年當山凡一載退居東菴二十八示寂塔于東菴巨石之巔第二十二代惠忠禪師懷安劉氏子紹興二十四年當山隆興二年示寂壽七十五臘五十五塔于東菴之陽第二十三代蘊聞禪師江西分寧縣沈氏子隆興二年當山乾道五年被旨住雙徑九年奉旨當山詔賜慧日禪師淳熙六年示寂第二十四代惠然禪師侯官黃氏子乾道五年當山淳熙元年示寂壽七十四臘五十一第二十五代原深禪師懷安劉氏子淳熙七年當山十年示寂壽六十五臘四十三塔于古寺法堂之西第二十六代宗一禪師江右南豐卜氏子淳熙十年當山紹熙四年示寂第二十七代惠深禪師閩縣馮氏子淳熙十六年當山次年示寂壽八十七臘五十九第二十八代南禪師侯官葉氏子紹熙四年當山次年示寂全身塔于舊院法堂第二十九代元聰禪師慶元元年當山三年示寂第三十代璧禪師慶元三年當山嘉泰元年被旨住淨慈寺示寂于雪竇第三十一代肇禪師嘉泰元年當山嘉定二年示寂塔于寺之左崦第三十二代體仁禪師長樂卓氏子嘉定三年當山一十五載重創寺宇百廢俱興第三十三代行謙禪師浙江鄞縣蹇氏子嘉定十六年當山寶慶三年示寂壽七十九臘六十一塔于鼓山第三十四代妙湛禪師浙江慈溪毛氏子寶慶元年當山紹定二年被旨住育王寺淳祐八年示寂第三十五代宗禪師紹定元年當山嘉熙二年示寂壽七十五塔于螺菴塔第三十六代沖禪師杭州荀氏子嘉熙元年當山次奉旨住徑山淳祐十年示寂壽八十一第三十七代德因大夢禪師廣東番禺李氏子嘉熙二年當山淳祐元年示寂壽六十四臘三十七塔于本山茶磨之傍李忠簡昴英有詩贈之第三十八代道源禪師連江王氏子住浙江淨慈寺閩帥徐侍郎啓請當山行至建寧光孝寺示寂徐帥繪像題讚送入當山影堂第三十九代了玉禪師長樂黃氏子淳祐二年當山十年示寂壽六十四臘四十六塔于本寺第四十代宗信禪師羅源王氏子淳祐十年當山次年示寂壽七十臘五十塔于舊院第四十一代果禪師懷安陳氏子淳祐十一年當山德祐元年示寂壽八十四塔于圓伊菴第四十二代一麟禪師永福林氏子景定二年當山凡三載後住靈隱示寂壽六十三第四十三代善珍禪師泉州南安呂氏子景定四年當山凡六載後奉旨住徑山示寂壽八十五第四十四代環溪禪師杭州賈氏子咸淳四年當山凡四載後示寂于天童寺第四十五代可湘禪師台州寧海葛氏子咸淳八年當山凡十載至元二十七年示寂于杭州寶壽寺壽八十五歸骨于雪峰建塔于西菴第四十六代至慧禪師懷安陳氏子咸淳十年當山凡七載後示寂于淨慈壽八十六第四十七代善用禪師福州人至元十七年當山第四十八代祖森禪師西蜀人至元二十三年當山第四十九代俊禪師至元二十三年當山凡十二載元貞二年朝京示寂于通州歸骨于鼓山南院第五十代聳禪師福寧鄭氏子大德元年當山三年示寂壽七十三塔于鼓山第五十一代雲禪師大德四年當山凡四載示寂塔于本山第五十二代鏡行禪師大德八年當山次年示寂于法海第五十三代悟逸樵隱禪師懷安聶氏子大德十年當山凡七載架造祖殿法堂僧堂退居西菴皇慶三年特旨復命當山造大殿佛像延祐四年造如歸堂六年復退居西菴泰定二年再承旨當山又七載元統二年示寂塔于海會塔之西第五十四代𥤱禪師莆田林氏子元統元年當山凡五載退隱壽七十示寂塔于東山舊院之側第五十五代有禪師天台禇氏子至元四年當山凡十載示寂壽七十七塔于本寺祖塔之西第五十六代隆禪師古田陳氏子至正七年當山凡八載退居秀峰示寂第五十七代明禪師江右德化孔氏子至正十五年當山凡六載示寂壽八十塔于二十七都應天寺後第五十八代逆川順禪師諱智順溫之瑞安陳氏子賜號佛性圓辨禪師當山三載有徐子剛據安仁莊聞師至亟還之詳在宋文憲公所撰塔銘第五十九代空禪師閩縣方氏子至正二十五年僅一載示寂第六十代崇禪師長樂李氏子至正二十六年當山凡六載洪武五年歸寂于升山寺塔于雪峰歷代塔第六十一代雪庭信禪師浙江山隂陳氏子洪武六年當山壽六十全身塔于西菴第六十二代愍忠慈禪師甌寧人洪武十年當山凡四載示寂壽六十一塔于象骨峰下第六十三代墀禪師長樂吳氏子洪武十四年當山示寂塔于太平莊後第六十四代正禪師閩縣謝氏子洪武十五年當山凡二十六載赴京示寂于中途骨歸塔于六華峰下第六十五代鏡堂宗禪師長樂林氏子授福州副都綱建文元年示寂塔于雪峰第六十六代希儒禪師湖廣江夏人建文三年授副都綱十六載能詩第六十七代重興雪峰寺正映潔菴禪師江西金溪洪氏子自幼托迹空門不茹葷腥永樂初住泉州開元寺後欽選當山凡一十五載營創佛殿法堂山門煥然一新後退歸鍾山之靈谷寺示寂第六十八代鎮禪師蜀巫山縣王氏子永樂十年當山第六十九代遠芷秋崖禪師江西臨川人永樂十六年當山侍師潔菴創造寺宇有功山門第七十代象祖禪師第七十一代良琛禪師宣德八年當山刻崇聖寺碑第七十二代祖淵禪師第七十三代無念禪師宣德十年當山第七十四代思惠禪師浙江錢塘俞氏子第七十五代慶預禪師湖廣郢州胡氏子第七十六代源潭月菴禪師湖廣蘄州張氏子正統十一年當山凡八載景泰改元沙尤起擾攘鄰郡總戎命潭招撫躬到賊營諭以威德平總鎮奏聞朝廷授僧録司右覺義職又自捐衣鉢之資於京師創建佛寺敕賜額善應寺成化十一年示寂憲宗皇帝遣禮部郎中于晃諭祭壽六十九臘四十四全身塔于善應寺之西菴潭善詩賦雪峰二十四景至今傳之第七十七代傳馨禪師江西南昌人景泰四年當山第七十八代源慶禪師應天上元人景泰五年當山凡五載退隱東堂成化十六年金骨入海會塔第七十九代志謙禪師莆田人天順二年當山第八十代源隆禪師浙江慈溪人天順三年當山凡十載後示寂於金陵草堂寺第八十一代智哲禪師浙江台州人成化四年當山次年示寂金骨入海會塔第八十二代智鎮禪師應天勾容人成化五年當山凡歷三載於七年重建大雄寶殿併佛像工程未周示寂金骨入海會塔第八十三代智明性菴禪師湖廣蘄州傅氏子成化八年當山凡十八載捐資圍砌佛殿墻垣起蓋枯木菴望州肅儀諸亭後退本寺南菴有雪峰二十四景詩弘治七年示寂全身塔於大穆莊第八十四代智潮禪師湖廣黃梅呂氏子成化十一年當山次年退歸蘄州五祖寺壽七十第八十四代慧洪禪師湖廣蘄州人弘治元年當山凡十載于十二年示寂金骨入本山海會塔第八十五代廣仁禪師湖廣蘄州人弘治九年當山赴京領劄凡四載十二年示寂第八十六代廣儀禪師懷安郭氏子弘治十三年當山十五年示寂于大穆莊葬于智明塔之南第八十七代慧經禪師山東東昌人弘治十五年領劄當山凡五載正德三年示寂于大穆莊金骨葬本寺海會塔第八十八代惠全禪師江西贑州人正德三年領劄當山第八十九代惠孜禪師山西雁門張氏子正德四年領劄當山凡六載歸隱西山善應寺示寂第九十代廣亨禪師湖廣黃州人正德九年領劄當山凡五載嘉靖六年示寂金骨入海會塔第九十一代廣欽禪師閩縣陳氏子正德十三年當山退隱本寺嘉靖四年示寂金骨入海會塔第九十二代德秀禪師湖廣嘉魚鄭氏子嘉靖四年當山凡八載聚集禪衆大闡法律募緣修蓋佛殿妝飾大佛三尊起蓋應天莊肅儀亭萬松關修整齋堂大穆莊砌造鐵鎖橋羅漢巖諸處十一年退歸京師善應寺示寂第九十三代德昌龍河禪師長樂王氏子嘉靖十二年當山募緣鑄鐘二口還回石塔寺古銅大鐘永鎮法堂重建化城亭修整太平莊二十九年示寂全身葬于本山龍灣第九十四代德曉禪師長樂黃氏子嘉靖十九年當山整飭清規嚴持戒律壽七十端坐而化全身葬于化生臺畔第九十五代德性禪師長樂葉氏子嘉靖二十五年當山次年退隱古田布金寺萬曆七年示寂壽七十五全身葬于化生臺第九十六代重興雪峰寺行存六華禪師長樂陳氏子嘉靖二十六年當山重修大殿妝塑諸天葺理兩廊頺廢一新隆慶四年示寂壽六十葬于龍山之東第九十七代行清碧泉禪師莆田陳氏子嘉靖三十四年當山凡六載塑彌勒像搆將軍亭造通佑殿壽六十九示寂金骨入本山海會塔第九十八代定聰明軒禪師長樂施氏子嘉靖三十七年當山萬曆六年示寂葬于龍山第九十九代仁岱近軒禪師長樂陳氏子嘉靖四十四年當山募建望州亭蓋藍田莊樓隆慶四年示寂葬于龍山之畔第一百代定綺華峰禪師長樂陳氏子嘉靖四十六年當山凡二十五載修舉廢墮咸有成勞萬曆二十年示寂葬于觀音牌之西第一百一代賢桐鳳岡禪師長樂戴氏子萬曆二十一年當山重創留香堂崇禎四年示寂第一百二代紹城居武禪師長樂陳氏子天啓五年當山第一百三代古雪恩禪師第一百四代亘信彌禪師泉州同安蔡氏子大清順治丙申年當山兼住持慶城寺至己亥七月十六日示寂建塔于柳洋後改移于漳州第一百五代白嵩俊禪師嗣玉林琇國師大清康熙辛亥年當山後寂于善權第一百六代恆濤心禪師莆田宋氏子嗣鼓山為霖和尚晚年兼住雪峰改移大殿未及告竣壽七十七示寂塔于鼓山般若菴第一百七代六吉謙禪師江右人論曰佛教入中國四百年而達磨至又八傳而至百丈祖師百丈吾郡長樂人也著為清規始有住持之名而尊之曰長老初由衆所推擇既而命之官苟非其人厥任曷勝吾觀雪峰自真覺大師開山以至今日當山長老歷百有餘代姓名年月各有稽核雖遷徙不常而舉揚宗乘祈福祝釐修造寶坊輸納國餉皆匪異人任也若夫揭佛日于中天振法雷于末運頽綱再整祖印重光則有俟于將來之龍象云
